# Standalone IPTV pubspec - lean mobile APK profile.
#
# Usage: Copy this to pubspec.yaml before standalone IPTV release builds, or
# use the platform build profile contract in .github/airo-build-profiles.json.
# This profile keeps only the native dependencies required by the Android host
# activity and the IPTV feature package.

name: airo_app
description: "Airo IPTV - standalone mobile IPTV player"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.12.2 <4.0.0"
  flutter: ">=3.44.4"

dependencies:
  flutter:
    sdk: flutter

  # State and persistence
  flutter_riverpod: 2.6.1
  shared_preferences: ^2.5.5

  # Networking
  dio: ^5.10.0

  # Android MainActivity extends AudioServiceActivity, so this stays real.
  audio_service: 0.18.19

  # IPTV feature surface and platform contracts.
  feature_iptv:
    path: ../packages/feature_iptv

  # UI essentials
  cupertino_icons: ^1.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: 6.0.0

dependency_overrides:
  rxdart: ^0.28.0
  flutter_chrome_cast:
    path: ../packages/platform_player/third_party/flutter_chrome_cast

flutter:
  uses-material-design: true
  assets:
    - assets/airo_icon.png

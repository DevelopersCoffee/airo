name: airo_app
description: "Airo - AI-powered super app with Gemini Nano integration"
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 0.0.5+7

environment:
  sdk: ">=3.12.2 <4.0.0"
  flutter: ">=3.44.4"
# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  # Routing & Navigation
  go_router: ^17.3.0

  # State Management
  riverpod: 3.3.2
  flutter_riverpod: 3.3.2

  # Storage & Persistence
  shared_preferences: ^2.5.5
  # NOTE: Drift upgrade requires analyzer ^13, but current Flutter SDK pins analyzer 12.1.0. Until SDK or custom_lint supports newer analyzer, we cannot upgrade drift further.
  drift: ^2.32.1
  path: 1.9.1
  path_provider: ^2.1.6

  # Connectivity
  connectivity_plus: ^7.2.0

  # Networking
  dio: ^5.10.0

  # Firebase & Authentication
  firebase_core: ^4.12.0
  firebase_auth: ^6.5.5
  google_sign_in: 7.2.0

  # Audio & Media
  audio_service: ^0.18.19  # Latest version with SDK 36 compatibility
  just_audio: ^0.10.6
  flutter_chrome_cast: ^1.4.6

  # Utilities
  intl: ^0.20.3
  uuid: ^4.5.3

  # Local packages - Core
  core_domain:
    path: ../packages/core_domain
  core_data:
    path: ../packages/core_data
  core_ui:
    path: ../packages/core_ui
  core_ai:
    path: ../packages/core_ai
  core_auth:
    path: ../packages/core_auth

  # Local packages - Features
  airo:
    path: ../packages/airo
  feature_coin:
    path: ../packages/feature_coin

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.9
  equatable: ^2.1.0
  flame: ^1.37.0
  flame_audio: ^2.12.1
  share_plus: ^13.2.0
  url_launcher: 6.3.2
  file_picker: ^12.0.0-beta.7
  flutter_local_notifications: ^22.0.1
  timezone: ^0.11.1
  audioplayers: ^6.7.1
  cached_network_image: 3.4.1
  flutter_tts: 4.2.5
  chess: 0.8.1
  stockfish: 1.8.1
  flutter_contacts: ^2.1.0
  permission_handler: ^12.0.3
  image_picker: ^1.2.3
  google_mlkit_text_recognition: 0.16.0
  video_player: ^2.13.0
  wakelock_plus: ^1.5.2
  package_info_plus: ^10.2.0
  screenshot: 3.0.0
  flutter_image_compress: 2.4.0
  pdfx: ^2.9.2
  feature_iptv:
    path: ../packages/feature_iptv
  platform_playlist:
    path: ../packages/platform_playlist
  platform_device_qualification:
    path: ../packages/platform_device_qualification
  platform_channels:
    path: ../packages/platform_channels
  platform_player:
    path: ../packages/platform_player
  platform_media:
    path: ../packages/platform_media
  platform_history:
    path: ../packages/platform_history
  platform_streams:
    path: ../packages/platform_streams

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  # Code generation
  build_runner: ^2.15.2
  drift_dev: 2.32.1
  riverpod_generator: 4.0.4
  mocktail: ^1.0.5
  alchemist: ^0.14.0  # Golden testing (replaces discontinued golden_toolkit)
  patrol: ^4.7.0  # E2E testing for iOS/Android devices
  shared_preferences_platform_interface: ^2.4.1
  flutter_lints: 6.0.0
  custom_lint: ^0.8.1
  riverpod_lint: 3.1.4

dependency_overrides:
  meta: ^1.19.0
  analyzer_plugin: ^0.14.0
  analyzer: ^12.0.0
  dart_style: 3.1.8
  mockito: 5.6.1
  source_gen: ^4.2.0
  build: ^4.0.0
  # IPTV/TV builds do not ship games, and stockfish 1.8.1's Android plugin is
  # incompatible with the current AGP toolchain. Use the existing no-native stub
  # so lean streaming variants can build without bundling the chess engine.
  stockfish:
    path: ../packages/stubs/stockfish_stub
  # flutter_chrome_cast 1.4.6 requires rxdart ^0.28.0, while the current
  # custom_lint stack requires ^0.27.7. See docs/adr/0007-cast-rxdart-override.md.
  rxdart: ^0.28.0
  # Platform-owned fork with the iOS contentID fix required for receiver playback.
  flutter_chrome_cast:
    path: ../packages/platform_player/third_party/flutter_chrome_cast
  # Pub package 1.5.3 declares an Android plugin class but does not ship the
  # Android source. Keep the upstream Dart/iOS API and provide the missing
  # Android FLAG_SECURE bridge locally so app builds retain screen protection.
  screen_protector:
    path: ../packages/third_party/screen_protector

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/audio/
    - assets/packs/
    - assets/airo_icon.png
    - assets/hermes/images/filler-bg0.jpg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  fonts:
    - family: AiroCollapse
      fonts:
        - asset: assets/hermes/fonts/Collapse-Regular.woff2
        - asset: assets/hermes/fonts/Collapse-Bold.woff2
          weight: 700
    - family: AiroRulesExpanded
      fonts:
        - asset: assets/hermes/fonts/RulesExpanded-Regular.woff2
        - asset: assets/hermes/fonts/RulesExpanded-Bold.woff2
          weight: 700
    - family: AiroMondwest
      fonts:
        - asset: assets/hermes/fonts/Mondwest-Regular.woff2
  #
# For details regarding fonts from package dependencies,
# see https://flutter.dev/to/font-from-package

patrol:
  android:
    package_name: io.airo.app
  ios:
    bundle_id: com.developerscoffee.airo

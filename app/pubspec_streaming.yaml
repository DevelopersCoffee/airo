# Streaming-specific pubspec - excludes games/OCR but keeps audio
# This file creates a <150MB APK for mobile streaming (IPTV + Music)
#
# Usage: Copy this to pubspec.yaml before streaming builds
# Heavy dependencies excluded:
# - stockfish: 1.8.1 (~108MB native libs)
# - flame: 1.35.0 + flame_audio: 2.11.13 (~5MB)
# - google_mlkit_text_recognition: 0.15.1 (~10MB)
# - chess: 0.8.1 (requires stockfish)

name: airo_app
description: "Airo Streaming - Music + IPTV for mobile"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.12.2 <4.0.0"
  flutter: ">=3.44.4"

dependencies:
  flutter:
    sdk: flutter

  # Routing & Navigation
  go_router: 17.1.0

  # State Management
  riverpod: 2.6.1
  flutter_riverpod: 2.6.1

  # Storage & Persistence
  shared_preferences: ^2.5.5
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.41
  hive: 2.2.3
  hive_flutter: 1.1.0
  path: 1.9.1
  path_provider: ^2.1.6

  # Connectivity
  connectivity_plus: ^7.1.1

  # Networking
  dio: ^5.10.0

  # Firebase & Authentication
  firebase_core: 4.4.0
  firebase_auth: 6.1.4
  google_sign_in: 7.2.0

  # Audio & Media - KEPT for streaming app!
  audio_service: ^0.18.18
  just_audio: ^0.10.5
  audioplayers: 6.5.1
  flutter_tts: 4.2.5

  # Video - KEPT for IPTV!
  video_player: ^2.11.1
  flutter_chrome_cast: ^1.4.6
  wakelock_plus: 1.5.2
  pdfx: 2.9.2
  flutter_local_notifications: 20.1.0
  timezone: 0.10.1

  # Utilities
  intl: 0.20.2
  uuid: 4.5.2

  # Local packages - Core
  core_domain:
    path: ../packages/core_domain
  core_data:
    path: ../packages/core_data
  core_ui:
    path: ../packages/core_ui
  core_ai:
    path: ../packages/core_ai
  core_auth:
    path: ../packages/core_auth

  # Local packages - Features (streaming only)
  airo:
    path: ../packages/airo

  # UI essentials
  cupertino_icons: ^1.0.9
  equatable: ^2.1.0
  cached_network_image: 3.4.1
  package_info_plus: 9.0.1

  # Dependencies with stub overrides (needed for compilation but using lightweight stubs)
  stockfish: 1.8.1
  chess: 0.8.1
  flame: 1.35.0
  google_mlkit_text_recognition: 0.15.1
  image_picker: 1.2.1
  file_picker: 10.3.10
  share_plus: 10.1.4
  url_launcher: 6.3.2
  flutter_image_compress: 2.4.0
  flutter_contacts: 1.1.9+2
  permission_handler: 12.0.0+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: 6.0.0

# Dependency overrides - point heavy packages to lightweight stubs
dependency_overrides:
  rxdart: ^0.28.0
  flutter_chrome_cast:
    path: ../packages/platform_player/third_party/flutter_chrome_cast

  # Heavy native library stubs (major size savings)
  stockfish:
    path: ../packages/stubs/stockfish_stub
  chess:
    path: ../packages/stubs/chess_stub
  flame:
    path: ../packages/stubs/flame_stub
  google_mlkit_text_recognition:
    path: ../packages/stubs/mlkit_stub

  # Utility package stubs (not needed for streaming)
  image_picker:
    path: ../packages/stubs/image_picker_stub
  file_picker:
    path: ../packages/stubs/file_picker_stub
  share_plus:
    path: ../packages/stubs/share_plus_stub
  flutter_image_compress:
    path: ../packages/stubs/flutter_image_compress_stub
  flutter_contacts:
    path: ../packages/stubs/flutter_contacts_stub
  permission_handler:
    path: ../packages/stubs/permission_handler_stub
  flutter_local_notifications:
    path: ../packages/stubs/flutter_local_notifications_stub
  timezone:
    path: ../packages/stubs/timezone_stub
  pdfx:
    path: ../packages/stubs/pdfx_stub

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
    - assets/airo_icon.png

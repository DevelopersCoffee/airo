name: airo_workspace
repository: https://github.com/DevelopersCoffee/airo

packages:
  - app
  - packages/**

ide:
  intellij:
    enabled: true
    moduleNamePrefix: ''

command:
  version:
    linkToCommits: true
    workspaceChangelog: true
  bootstrap:
    usePubspecOverrides: true

scripts:
  # Bootstrap all packages
  bootstrap:
    run: melos bootstrap
    description: Bootstrap all packages in the workspace

  # Clean all packages
  clean:
    run: melos clean
    description: Clean all packages

  # Get dependencies for all packages
  get:
    run: melos exec -- flutter pub get
    description: Get dependencies for all packages

  # Run analyzer on all packages
  analyze:
    run: melos exec -- flutter analyze --fatal-infos
    description: Run flutter analyze on all packages
    failFast: true

  # Format all packages
  format:
    run: melos exec -- dart format --set-exit-if-changed .
    description: Format all Dart files

  # Format and fix all packages
  format:fix:
    run: melos exec -- dart format .
    description: Format all Dart files (apply changes)

  # Run tests for all packages
  test:
    run: melos exec --fail-fast -- flutter test
    description: Run tests for all packages
    packageFilters:
      dirExists: test

  # Run tests with coverage
  test:coverage:
    run: melos exec -- flutter test --coverage
    description: Run tests with coverage for all packages
    packageFilters:
      dirExists: test

  # Run host-only Airo TV performance benchmark smoke.
  bench:
    description: Run host-only Airo TV benchmark harness and write metrics JSON
    run: |
      cd packages/platform_benchmarks
      flutter pub get
      dart run tool/run_airo_tv_benchmarks.dart \
        --output ../../artifacts/performance/airo-tv-host-benchmark.json
      dart run tool/render_airo_tv_benchmark_report.dart \
        --input ../../artifacts/performance/airo-tv-host-benchmark.json \
        --output ../../artifacts/performance/airo-tv-host-benchmark.md

  # Render a readable markdown report from the latest host benchmark JSON.
  bench:report:
    description: Render Airo TV benchmark markdown report from metrics JSON
    run: |
      cd packages/platform_benchmarks
      flutter pub get
      dart run tool/render_airo_tv_benchmark_report.dart \
        --input ../../artifacts/performance/airo-tv-host-benchmark.json \
        --output ../../artifacts/performance/airo-tv-host-benchmark.md

  # Run code generation
  generate:
    run: melos exec -- flutter pub run build_runner build --delete-conflicting-outputs
    description: Run build_runner for all packages
    packageFilters:
      dependsOn: build_runner

  # Check for outdated dependencies
  outdated:
    run: melos exec -- flutter pub outdated
    description: Check for outdated dependencies

  # Upgrade dependencies
  upgrade:
    run: melos exec -- flutter pub upgrade
    description: Upgrade dependencies for all packages

  # Run all checks (CI simulation)
  ci:
    description: Run all CI checks
    run: |
      melos run format
      melos run analyze
      melos run test

  # Quick check before commit
  precommit:
    description: Run format and analyze before commit
    run: |
      melos run format:fix
      melos run analyze

  # =============================================================================
  # Platform-Specific Builds (Phase 0.5+ Multi-Platform Strategy)
  # =============================================================================

  # Build Android TV APK (IPTV only)
  build:tv:
    description: Build Android TV APK (<120MB target)
    run: |
      cd app
      flutter build apk --release \
        --target=lib/main_tv.dart \
        --dart-define=APP_VARIANT=tv \
        --dart-define=APP_PLATFORM=androidTv \
        --split-per-abi \
        --tree-shake-icons
      echo "✓ TV APK created at build/app/outputs/flutter-apk/"

  # Build Mobile Streaming APK (Music + IPTV)
  build:streaming:
    description: Build Mobile Streaming APK (<150MB target)
    run: |
      cd app
      flutter build apk --release \
        --target=lib/main_mobile_streaming.dart \
        --dart-define=APP_VARIANT=streaming \
        --dart-define=APP_PLATFORM=mobileStreaming \
        --split-per-abi \
        --tree-shake-icons
      echo "✓ Streaming APK created at build/app/outputs/flutter-apk/"

  # Build Mobile Full APK (all features)
  build:full:
    description: Build Mobile Full APK (all features)
    run: |
      cd app
      flutter build apk --release \
        --target=lib/main.dart \
        --dart-define=APP_VARIANT=full \
        --dart-define=APP_PLATFORM=mobileFull \
        --split-per-abi \
        --tree-shake-icons
      echo "✓ Full APK created at build/app/outputs/flutter-apk/"

  # Build all platform variants
  build:all-platforms:
    description: Build APKs for all platforms (TV, Streaming, Full)
    run: |
      melos run build:tv
      melos run build:streaming
      melos run build:full
      echo "✓ All platform APKs created!"

  # Analyze APK sizes
  apk:sizes:
    description: Show APK sizes for all built variants
    run: |
      echo "=== APK Sizes ==="
      ls -lh app/build/app/outputs/flutter-apk/*.apk 2>/dev/null || echo "No APKs found. Run build:all-platforms first."

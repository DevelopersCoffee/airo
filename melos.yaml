name: airo_workspace
repository: https://github.com/DevelopersCoffee/airo

packages:
  - app
  - packages/**

ide:
  intellij:
    enabled: true
    moduleNamePrefix: ''

command:
  version:
    linkToCommits: true
    workspaceChangelog: true
  bootstrap:
    usePubspecOverrides: true

scripts:
  # Bootstrap all packages
  bootstrap:
    run: melos bootstrap
    description: Bootstrap all packages in the workspace

  # Clean all packages
  clean:
    run: melos clean
    description: Clean all packages

  # Get dependencies for all packages
  get:
    run: melos exec -- flutter pub get
    description: Get dependencies for all packages

  # Run analyzer on all packages
  analyze:
    run: melos exec -- flutter analyze --fatal-infos
    description: Run flutter analyze on all packages
    failFast: true

  # Format all packages
  format:
    run: melos exec -- dart format --set-exit-if-changed .
    description: Format all Dart files

  # Format and fix all packages
  format:fix:
    run: melos exec -- dart format .
    description: Format all Dart files (apply changes)

  # Run tests for all packages
  test:
    run: melos exec --fail-fast -- flutter test
    description: Run tests for all packages
    packageFilters:
      dirExists: test

  # Run tests with coverage
  test:coverage:
    run: melos exec -- flutter test --coverage
    description: Run tests with coverage for all packages
    packageFilters:
      dirExists: test

  # Run host-only Airo TV performance benchmark smoke.
  bench:
    description: Run host-only Airo TV benchmark harness and write metrics JSON
    run: |
      cd packages/platform_benchmarks
      flutter pub get
      dart run tool/run_airo_tv_benchmarks.dart \
        --fixture ../../iptv-data/fixtures/iptv-org/index.m3u \
        --fixture-id iptv-org-index-sanitized-2026-07-15 \
        --output ../../artifacts/performance/airo-tv-host-benchmark.json
      dart run tool/render_airo_tv_benchmark_report.dart \
        --input ../../artifacts/performance/airo-tv-host-benchmark.json \
        --output ../../artifacts/performance/airo-tv-host-benchmark.md

  # Render a readable markdown report from the latest host benchmark JSON.
  bench:report:
    description: Render Airo TV benchmark markdown report from metrics JSON
    run: |
      cd packages/platform_benchmarks
      flutter pub get
      dart run tool/render_airo_tv_benchmark_report.dart \
        --input ../../artifacts/performance/airo-tv-host-benchmark.json \
        --output ../../artifacts/performance/airo-tv-host-benchmark.md

  # Generate the deterministic synthetic XMLTV fixture used by EPG benchmarks.
  bench:xmltv-fixture:
    description: Generate the 50 MiB XMLTV benchmark fixture and manifest
    run: |
      cd packages/platform_benchmarks
      flutter pub get
      dart run tool/generate_xmltv_fixture.dart \
        --fixture-id generated-xmltv-50mb-v1 \
        --output ../../iptv-data/fixtures/xmltv/generated-50mb.xml \
        --manifest ../../iptv-data/fixtures/xmltv/generated-50mb.manifest.json \
        --target-bytes 52428800 \
        --channels 512 \
        --programme-minutes 30

  # Capture a local Android TV RSS timeline from adb without scheduling CI.
  bench:tv-memory:
    description: Capture local Airo TV memory timeline from adb meminfo
    run: |
      cd packages/platform_benchmarks
      flutter pub get
      dart run tool/capture_airo_tv_memory_timeline.dart \
        --package "${AIRO_TV_PACKAGE:-io.airo.app}" \
        --samples "${AIRO_TV_MEMORY_SAMPLES:-60}" \
        --interval-seconds "${AIRO_TV_MEMORY_INTERVAL_SECONDS:-30}" \
        --budget "${AIRO_TV_MEMORY_BUDGET:-constrained}" \
        --output-json ../../artifacts/performance/airo-tv-adb-memory-timeline.json \
        --output-markdown ../../artifacts/performance/airo-tv-adb-memory-timeline.md

  # Render local Airo TV logo-scroll memory and jank evidence.
  bench:tv-logo-scroll-report:
    description: Write sanitized Airo TV logo-scroll evidence from local metrics
    run: |
      cd packages/platform_benchmarks
      flutter pub get
      dart run tool/write_logo_scroll_report.dart \
        --report-id "${AIRO_TV_LOGO_SCROLL_REPORT_ID:-manual-logo-scroll-sample}" \
        --scenario-id "${AIRO_TV_LOGO_SCROLL_SCENARIO_ID:-large-logo-grid-scroll}" \
        --playlist-channels "${AIRO_TV_LOGO_SCROLL_PLAYLIST_CHANNELS:?Set AIRO_TV_LOGO_SCROLL_PLAYLIST_CHANNELS from the measured playlist}" \
        --visible-cells "${AIRO_TV_LOGO_SCROLL_VISIBLE_CELLS:?Set AIRO_TV_LOGO_SCROLL_VISIBLE_CELLS from the measured viewport}" \
        --duration-seconds "${AIRO_TV_LOGO_SCROLL_DURATION_SECONDS:?Set AIRO_TV_LOGO_SCROLL_DURATION_SECONDS from the measured run}" \
        --baseline-rss-mb "${AIRO_TV_LOGO_SCROLL_BASELINE_RSS_MB:?Set AIRO_TV_LOGO_SCROLL_BASELINE_RSS_MB from adb meminfo}" \
        --peak-rss-mb "${AIRO_TV_LOGO_SCROLL_PEAK_RSS_MB:?Set AIRO_TV_LOGO_SCROLL_PEAK_RSS_MB from adb meminfo}" \
        --steady-rss-mb "${AIRO_TV_LOGO_SCROLL_STEADY_RSS_MB:?Set AIRO_TV_LOGO_SCROLL_STEADY_RSS_MB from adb meminfo}" \
        --rss-plateau-delta-mb "${AIRO_TV_LOGO_SCROLL_PLATEAU_DELTA_MB:?Set AIRO_TV_LOGO_SCROLL_PLATEAU_DELTA_MB from the final sample window}" \
        --image-cache-peak-mb "${AIRO_TV_LOGO_SCROLL_IMAGE_CACHE_PEAK_MB:?Set AIRO_TV_LOGO_SCROLL_IMAGE_CACHE_PEAK_MB from image-cache telemetry}" \
        --frame-jank-count "${AIRO_TV_LOGO_SCROLL_FRAME_JANK_COUNT:-0}" \
        --decode-jank-frame-count "${AIRO_TV_LOGO_SCROLL_DECODE_JANK_FRAME_COUNT:-0}" \
        --output-json ../../artifacts/performance/airo-tv-logo-scroll-report.json \
        --output-markdown ../../artifacts/performance/airo-tv-logo-scroll-report.md

  # Render a local Cast proxy benchmark report from captured device metrics.
  bench:cast-proxy-report:
    description: Write sanitized Cast proxy benchmark evidence from local metrics
    run: |
      cd packages/platform_benchmarks
      flutter pub get
      dart run tool/write_cast_proxy_benchmark_report.dart \
        --sample-id "${CAST_PROXY_SAMPLE_ID:-manual-cast-proxy-sample}" \
        --scenario-id "${CAST_PROXY_SCENARIO_ID:-20mbps-10m-cast-relay}" \
        --target-mbps "${CAST_PROXY_TARGET_MBPS:-20}" \
        --observed-mbps "${CAST_PROXY_OBSERVED_MBPS:?Set CAST_PROXY_OBSERVED_MBPS from measured throughput}" \
        --cpu-percent "${CAST_PROXY_CPU_PERCENT:?Set CAST_PROXY_CPU_PERCENT from measured sender CPU}" \
        --duration-seconds "${CAST_PROXY_DURATION_SECONDS:-600}" \
        --dropped-connections "${CAST_PROXY_DROPPED_CONNECTIONS:-0}" \
        --output-json ../../artifacts/performance/cast-proxy-benchmark.json \
        --output-markdown ../../artifacts/performance/cast-proxy-benchmark.md

  # Run code generation
  generate:
    run: melos exec -- flutter pub run build_runner build --delete-conflicting-outputs
    description: Run build_runner for all packages
    packageFilters:
      dependsOn: build_runner

  # Check for outdated dependencies
  outdated:
    run: melos exec -- flutter pub outdated
    description: Check for outdated dependencies

  # Upgrade dependencies
  upgrade:
    run: melos exec -- flutter pub upgrade
    description: Upgrade dependencies for all packages

  # Run all checks (CI simulation)
  ci:
    description: Run all CI checks
    run: |
      melos run format
      melos run analyze
      melos run test

  # Quick check before commit
  precommit:
    description: Run format and analyze before commit
    run: |
      melos run format:fix
      melos run analyze

  # =============================================================================
  # Platform-Specific Builds (Phase 0.5+ Multi-Platform Strategy)
  # =============================================================================

  # Build Android TV APK (IPTV only)
  build:tv:
    description: Build Android TV APK (<120MB target)
    run: |
      cd app
      flutter build apk --release \
        --target=lib/main_tv.dart \
        --dart-define=APP_VARIANT=tv \
        --dart-define=APP_PLATFORM=androidTv \
        --split-per-abi \
        --tree-shake-icons
      echo "✓ TV APK created at build/app/outputs/flutter-apk/"

  # Build Mobile Streaming APK (Music + IPTV)
  build:streaming:
    description: Build Mobile Streaming APK (<150MB target)
    run: |
      cd app
      flutter build apk --release \
        --target=lib/main_mobile_streaming.dart \
        --dart-define=APP_VARIANT=streaming \
        --dart-define=APP_PLATFORM=mobileStreaming \
        --split-per-abi \
        --tree-shake-icons
      echo "✓ Streaming APK created at build/app/outputs/flutter-apk/"

  # Build Mobile Full APK (all features)
  build:full:
    description: Build Mobile Full APK (all features)
    run: |
      cd app
      flutter build apk --release \
        --target=lib/main.dart \
        --dart-define=APP_VARIANT=full \
        --dart-define=APP_PLATFORM=mobileFull \
        --split-per-abi \
        --tree-shake-icons
      echo "✓ Full APK created at build/app/outputs/flutter-apk/"

  # Build all platform variants
  build:all-platforms:
    description: Build APKs for all platforms (TV, Streaming, Full)
    run: |
      melos run build:tv
      melos run build:streaming
      melos run build:full
      echo "✓ All platform APKs created!"

  # Analyze APK sizes
  apk:sizes:
    description: Show APK sizes for all built variants
    run: |
      echo "=== APK Sizes ==="
      ls -lh app/build/app/outputs/flutter-apk/*.apk 2>/dev/null || echo "No APKs found. Run build:all-platforms first."

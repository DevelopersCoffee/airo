name: platform_coin_vault
description: "Biometric-gated, field-encrypted local vault storage for Airo Coin (bank accounts, PAN, credit card refs, secure documents)."
version: 0.0.1
publish_to: none

environment:
  sdk: ">=3.12.2 <4.0.0"
  flutter: ">=3.44.4"

dependencies:
  flutter:
    sdk: flutter
  core_domain:
    path: ../core_domain
  core_data:
    path: ../core_data
  cryptography: ^2.7.0
  local_auth: ^2.3.0
  flutter_secure_storage: ^10.3.1
  sqflite: ^2.4.3
  equatable: ^2.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  sqflite_common_ffi: ^2.3.6

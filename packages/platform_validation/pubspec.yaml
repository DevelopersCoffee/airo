name: platform_validation
description: Validation layer bridging downloads to runtime.
version: 0.1.0
publish_to: none

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  platform_core:
    path: ../platform_core
  platform_logging:
    path: ../platform_logging
  platform_events:
    path: ../platform_events
  platform_settings:
    path: ../platform_settings
  platform_filesystem:
    path: ../platform_filesystem
  platform_downloads:
    path: ../platform_downloads
  platform_hardware:
    path: ../platform_hardware
  platform_models:
    path: ../platform_models

  uuid: any
  mocktail: ^1.0.3
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

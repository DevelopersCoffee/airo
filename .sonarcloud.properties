# Only read by SonarCloud's Automatic Analysis. Once Automatic Analysis
# is turned off (Administration > Analysis Method) in favor of the
# CI-based scan in .github/workflows/ci.yml, this file is dormant --
# the equivalent exclusions now live in sonar.exclusions in
# sonar-project.properties, which is what CI-based analysis reads.
sonar.exclusions=.github/workflows/**,app/third_party/**,app/android/**,app/ios/**,app/macos/**,app/windows/**,app/linux/**,app/web/**,e2e/**,iptv-data/**,packages/**,scripts/**

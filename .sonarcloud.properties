# SonarCloud automatic analysis ignores sonar-project.properties.
# Keep the GitHub App check scoped to first-party app source; CI runs the
# configured Dart analysis with coverage separately.
sonar.exclusions=.github/workflows/**,app/third_party/**,app/android/**,app/ios/**,app/macos/**,app/windows/**,app/linux/**,app/web/**,e2e/**,iptv-data/**,packages/**,scripts/**

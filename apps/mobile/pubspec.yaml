name: airo_app
description: "AIRO Application Shell"
publish_to: 'none'

version: 0.0.1-dev

environment:
  sdk: ">=3.12.2 <4.0.0"
  flutter: ">=3.44.4"

dependencies:
  flutter:
    sdk: flutter

  # Routing
  go_router: ^17.3.0

  # State Management
  riverpod: 2.6.1
  flutter_riverpod: 2.6.1

  # Platform Packages
  platform_core:
    path: ../../packages/platform_core
  platform_events:
    path: ../../packages/platform_events
  platform_logging:
    path: ../../packages/platform_logging
  platform_settings:
    path: ../../packages/platform_settings
  platform_storage:
    path: ../../packages/platform_storage
  platform_models:
    path: ../../packages/platform_models
  platform_hardware:
    path: ../../packages/platform_hardware
  platform_filesystem:
    path: ../../packages/platform_filesystem
  platform_downloads:
    path: ../../packages/platform_downloads
  platform_validation:
    path: ../../packages/platform_validation
  platform_engine_sdk:
    path: ../../packages/platform_engine_sdk
  platform_native:
    path: ../../packages/platform_native
  platform_engine_llama:
    path: ../../packages/platform_engine_llama
  platform_delegates:
    path: ../../packages/platform_delegates
  platform_engine_litert:
    path: ../../packages/platform_engine_litert
  platform_runtime_certification:
    path: ../../packages/platform_runtime_certification
  platform_manifest:
    path: ../../packages/platform_manifest
  platform_plugins:
    path: ../../packages/platform_plugins
  platform_contracts:
    path: ../../packages/platform_contracts
  platform_registry:
    path: ../../packages/platform_registry
  platform_schemas:
    path: ../../packages/platform_schemas
  platform_tools:
    path: ../../packages/platform_tools
  platform_protocols:
    path: ../../packages/platform_protocols
  platform_mcp:
    path: ../../packages/platform_mcp
  platform_composition:
    path: ../../packages/platform_composition
  platform_services:
    path: ../../packages/platform_services
  platform_build:
    path: ../../packages/platform_build
  platform_cli:
    path: ../../packages/platform_cli
  platform_devtools:
    path: ../../packages/platform_devtools
  platform_jobs:
    path: ../../packages/platform_jobs
  platform_runtime:
    path: ../../packages/platform_runtime
  design_system:
    path: ../../packages/design_system

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: 6.0.0

flutter:
  uses-material-design: true

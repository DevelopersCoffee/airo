name: Airo TV Release

on:
  workflow_call:
    outputs:
      firebase_distribution_status:
        description: 'Firebase App Distribution result status'
        value: ${{ jobs.firebase-distribution.outputs.status }}
      firebase_distribution_url:
        description: 'Firebase App Distribution console URL when available'
        value: ${{ jobs.firebase-distribution.outputs.url }}
      signing_cert:
        description: 'Which cert signed the TV APK/AAB: production, dogfood-stable, or ephemeral-ci-validation'
        value: ${{ jobs.build-tv.outputs.signing_cert }}
    inputs:
      version:
        description: 'Airo TV artifact and release version label'
        required: true
        type: string
      build_name:
        description: 'Android versionName, for example 0.0.2'
        required: true
        type: string
      build_number:
        description: 'Android versionCode, must increase for every Play upload'
        required: true
        type: string
      release_ref:
        description: 'Git ref to cut the release from; use v2 for Airo TV release line'
        required: true
        type: string
      release_branch:
        description: 'Release branch to create/update from release_ref before building'
        required: true
        type: string
      publish_github_release:
        description: 'Create/update the GitHub release and attach artifacts'
        required: true
        type: boolean
      production_signing:
        description: 'Require production Android signing and Firebase secrets'
        required: true
        type: boolean
      play_track:
        description: 'Optional Play upload track'
        required: true
        type: string
      firebase_distribution:
        description: 'Firebase App Distribution mode'
        required: true
        type: string
      firebase_app_id:
        description: 'Firebase App Distribution app ID for TV'
        required: false
        type: string
      firebase_tester_groups:
        description: 'Comma-separated Firebase tester groups'
        required: false
        type: string
  pull_request:
    branches: [ v2 ]
    paths:
      - 'app/**'
      - 'packages/**'
      - 'scripts/**'
      - '.github/workflows/airo-tv-release.yml'
  push:
    branches: [ v2 ]
    paths:
      - 'app/**'
      - 'packages/**'
      - 'scripts/**'
      - '.github/workflows/airo-tv-release.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Airo TV artifact and release version label'
        required: true
        default: 'airo-tv-v0.0.2'
      build_name:
        description: 'Android versionName, for example 0.0.2'
        required: true
        default: '0.0.2'
      build_number:
        description: 'Android versionCode, must increase for every Play upload'
        required: true
        default: '2'
      release_ref:
        description: 'Git ref to cut the release from; use v2 for Airo TV release line'
        required: true
        default: 'v2'
      release_branch:
        description: 'Release branch to create/update from release_ref before building'
        required: true
        default: 'release/airo-tv-v0.0.2'
      publish_github_release:
        description: 'Create/update the GitHub release and attach artifacts'
        required: true
        default: true
        type: boolean
      production_signing:
        description: 'Require production Android signing and Firebase secrets'
        required: true
        default: false
        type: boolean
      play_track:
        description: 'Optional Play upload track'
        required: true
        default: none
        type: choice
        options:
          - none
          - internal
          - alpha
          - beta
          - production
      firebase_distribution:
        description: 'Firebase App Distribution mode'
        required: true
        default: none
        type: choice
        options:
          - none
          - upload
      firebase_app_id:
        description: 'Firebase App Distribution app ID for TV'
        required: false
        default: ''
      firebase_tester_groups:
        description: 'Comma-separated Firebase tester groups'
        required: false
        default: ''

concurrency:
  group: airo-tv-release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  FLUTTER_VERSION: '3.44.4'
  RELEASE_VERSION: ${{ inputs.version || github.event.inputs.version || github.ref_name }}
  BUILD_NAME: ${{ inputs.build_name || github.event.inputs.build_name || '0.0.2' }}
  BUILD_NUMBER: ${{ inputs.build_number || github.event.inputs.build_number || '2' }}

jobs:
  prepare-release-branch:
    name: Cut release branch from v2
    runs-on: ubuntu-latest
    outputs:
      release_ref: ${{ steps.release_ref.outputs.ref || steps.current_ref.outputs.ref }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ inputs.release_ref || github.event.inputs.release_ref || github.ref }}

      - name: Use current ref for PR/push validation
        id: current_ref
        if: github.event_name != 'workflow_dispatch' && github.event_name != 'workflow_call'
        run: echo "ref=${GITHUB_REF}" >> "$GITHUB_OUTPUT"

      - name: Create release branch from v2 base
        id: release_ref
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call'
        env:
          RELEASE_BRANCH: ${{ inputs.release_branch || github.event.inputs.release_branch || 'release/airo-tv-v0.0.2' }}
          RELEASE_REF: ${{ inputs.release_ref || github.event.inputs.release_ref || 'v2' }}
        run: |
          git fetch origin main
          if [ "$RELEASE_REF" != "main" ]; then
            git fetch origin "$RELEASE_REF" || true
          fi
          if git rev-parse --verify "origin/$RELEASE_REF^{commit}" >/dev/null 2>&1; then
            base_ref="origin/$RELEASE_REF"
          else
            base_ref="$RELEASE_REF"
          fi
          git checkout -B "$RELEASE_BRANCH" "$base_ref"
          git push origin "$RELEASE_BRANCH" --force-with-lease
          echo "ref=$RELEASE_BRANCH" >> "$GITHUB_OUTPUT"

      - name: Validate Firebase distribution inputs
        env:
          FIREBASE_DISTRIBUTION: ${{ inputs.firebase_distribution || github.event.inputs.firebase_distribution || 'none' }}
          FIREBASE_APP_ID: ${{ inputs.firebase_app_id || github.event.inputs.firebase_app_id }}
          FIREBASE_TESTER_GROUPS: ${{ inputs.firebase_tester_groups || github.event.inputs.firebase_tester_groups }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          case "$FIREBASE_DISTRIBUTION" in
            none|upload) ;;
            *)
              echo "::error::Unsupported Firebase distribution mode: $FIREBASE_DISTRIBUTION"
              exit 1
              ;;
          esac

          if [[ "$FIREBASE_DISTRIBUTION" == "upload" ]]; then
            missing=0
            for name in FIREBASE_APP_ID FIREBASE_TESTER_GROUPS FIREBASE_SERVICE_ACCOUNT_JSON; do
              if [[ -z "${!name}" ]]; then
                echo "::error::$name is required when Firebase distribution mode is upload."
                missing=1
              fi
            done
            [[ "$missing" -eq 0 ]] || exit 1
          fi

  release-checks:
    name: TV release checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [prepare-release-branch]
    if: always() && !failure() && !cancelled()
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare-release-branch.outputs.release_ref || github.ref }}

      - name: Validate Android TV release metadata
        run: scripts/check-android-tv-release.sh

  build-tv:
    name: Build Airo TV APK and AAB
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [prepare-release-branch, release-checks]
    outputs:
      signing_cert: ${{ steps.android_signing.outputs.signing_cert }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare-release-branch.outputs.release_ref || github.ref }}

      - name: Normalize release artifact label
        run: |
          release_version="$(printf '%s' "$RELEASE_VERSION" | sed 's/[^A-Za-z0-9._-]/-/g')"
          echo "RELEASE_VERSION=$release_version" >> "$GITHUB_ENV"

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.pub-cache
            app/.dart_tool
            packages/*/.dart_tool
          key: tv-pub-${{ runner.os }}-${{ hashFiles('**/pubspec.lock', 'app/pubspec_tv.yaml') }}
          restore-keys: tv-pub-${{ runner.os }}-

      - name: Cache Gradle
        uses: actions/cache@v6
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: tv-gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: tv-gradle-${{ runner.os }}-

      - name: Configure Firebase for TV build
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
          PRODUCTION_SIGNING: ${{ inputs.production_signing || github.event.inputs.production_signing || 'false' }}
        run: |
          cd app
          write_placeholder_config() {
            cat > android/app/google-services.json <<'JSON'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "airo-tv-ci-placeholder",
              "storage_bucket": "airo-tv-ci-placeholder.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000000000",
                  "android_client_info": {
                    "package_name": "io.airo.app.tv"
                  }
                },
                "oauth_client": [],
                "api_key": [
                  {
                    "current_key": "ci-placeholder"
                  }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              }
            ],
            "configuration_version": "1"
          }
          JSON
          }

          if [[ -n "$GOOGLE_SERVICES_JSON" ]]; then
            echo "$GOOGLE_SERVICES_JSON" | base64 -d > android/app/google-services.json
            if grep -q '"package_name"[[:space:]]*:[[:space:]]*"io.airo.app.tv"' android/app/google-services.json; then
              echo "Using GOOGLE_SERVICES_JSON for io.airo.app.tv."
            elif [[ "$PRODUCTION_SIGNING" == "true" ]]; then
              echo "::error::GOOGLE_SERVICES_JSON must include a Firebase Android client for io.airo.app.tv."
              exit 1
            else
              echo "::warning::GOOGLE_SERVICES_JSON does not include io.airo.app.tv; using auth-free TV placeholder Firebase config."
              write_placeholder_config
            fi
          elif [[ "$PRODUCTION_SIGNING" == "true" ]]; then
            echo "::error::GOOGLE_SERVICES_JSON is required for production-signed release builds."
            exit 1
          else
            echo "::warning::GOOGLE_SERVICES_JSON is not set; using auth-free TV placeholder Firebase config."
            write_placeholder_config
          fi

      - name: Configure firebase_options.dart
        env:
          FIREBASE_OPTIONS_DART_B64: ${{ secrets.FIREBASE_OPTIONS_DART_B64 }}
        run: |
          cd app
          if [[ -n "$FIREBASE_OPTIONS_DART_B64" ]]; then
            echo "$FIREBASE_OPTIONS_DART_B64" | base64 -d > lib/firebase_options.dart
            echo "Using FIREBASE_OPTIONS_DART_B64."
          else
            cp lib/firebase_options.dart.template lib/firebase_options.dart
            echo "::warning::FIREBASE_OPTIONS_DART_B64 is not set; using placeholder firebase_options.dart (Firebase init will be skipped at runtime)."
          fi

      - name: Configure Android signing
        id: android_signing
        env:
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          DOGFOOD_KEYSTORE_BASE64: ${{ secrets.DOGFOOD_KEYSTORE_BASE64 }}
          DOGFOOD_KEYSTORE_PASSWORD: ${{ secrets.DOGFOOD_KEYSTORE_PASSWORD }}
          DOGFOOD_KEY_ALIAS: ${{ secrets.DOGFOOD_KEY_ALIAS }}
          DOGFOOD_KEY_PASSWORD: ${{ secrets.DOGFOOD_KEY_PASSWORD }}
          PRODUCTION_SIGNING: ${{ inputs.production_signing || github.event.inputs.production_signing || 'false' }}
        run: |
          cd app/android
          if [[ "$PRODUCTION_SIGNING" == "true" ]]; then
            missing=0
            for name in ANDROID_RELEASE_KEYSTORE_BASE64 KEYSTORE_PASSWORD KEY_ALIAS KEY_PASSWORD; do
              if [[ -z "${!name}" ]]; then
                echo "::error::Missing required Android release signing secret: $name"
                missing=1
              fi
            done
            [[ "$missing" -eq 0 ]] || exit 1
            echo "$ANDROID_RELEASE_KEYSTORE_BASE64" | base64 -d > release.keystore
            {
              echo "storeFile=release.keystore"
              echo "storePassword=$KEYSTORE_PASSWORD"
              echo "keyAlias=$KEY_ALIAS"
              echo "keyPassword=$KEY_PASSWORD"
            } > key.properties
            echo "signing_cert=production" >> "$GITHUB_OUTPUT"
          elif [[ -n "$DOGFOOD_KEYSTORE_BASE64" ]]; then
            missing=0
            for name in DOGFOOD_KEYSTORE_BASE64 DOGFOOD_KEYSTORE_PASSWORD DOGFOOD_KEY_ALIAS DOGFOOD_KEY_PASSWORD; do
              if [[ -z "${!name}" ]]; then
                echo "::error::Missing required dogfood signing secret: $name"
                missing=1
              fi
            done
            [[ "$missing" -eq 0 ]] || exit 1
            echo "$DOGFOOD_KEYSTORE_BASE64" | base64 -d > dogfood.keystore
            {
              echo "storeFile=dogfood.keystore"
              echo "storePassword=$DOGFOOD_KEYSTORE_PASSWORD"
              echo "keyAlias=$DOGFOOD_KEY_ALIAS"
              echo "keyPassword=$DOGFOOD_KEY_PASSWORD"
            } > key.properties
            echo "signing_cert=dogfood-stable" >> "$GITHUB_OUTPUT"
          else
            # Ephemeral CI-validation cert: a fresh keystore is generated every run, so
            # each build has a different cert. Installing this build over any previous
            # RC/CI build fails with INSTALL_FAILED_UPDATE_INCOMPATIBLE. Configure the
            # DOGFOOD_KEYSTORE_BASE64 secret (see docs) for RC installs that upgrade cleanly.
            echo "::warning::Signing with an ephemeral CI-validation keystore (regenerated every run). Installing this build over a previous RC/CI build will fail with INSTALL_FAILED_UPDATE_INCOMPATIBLE. Configure DOGFOOD_KEYSTORE_BASE64 for a stable dogfood signing cert."
            keytool -genkeypair \
              -v \
              -keystore ci-validation.keystore \
              -storepass ci-validation-password \
              -keypass ci-validation-password \
              -alias ci-validation \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Airo TV CI Validation,O=DevelopersCoffee,C=US"
            {
              echo "storeFile=ci-validation.keystore"
              echo "storePassword=ci-validation-password"
              echo "keyAlias=ci-validation"
              echo "keyPassword=ci-validation-password"
            } > key.properties
            echo "signing_cert=ephemeral-ci-validation" >> "$GITHUB_OUTPUT"
          fi
          chmod 600 *.keystore key.properties

      - name: Apply TV pubspec
        run: |
          cp app/pubspec.yaml app/pubspec.yaml.backup
          cp app/pubspec_tv.yaml app/pubspec.yaml

      - name: Get dependencies
        run: |
          (cd packages/core_domain && flutter pub get) &
          (cd packages/core_ui && flutter pub get) &
          (cd packages/core_data && flutter pub get) &
          (cd packages/core_ai && flutter pub get) &
          (cd packages/core_auth && flutter pub get) &
          wait
          cd app && flutter pub get

      - name: Patch Android plugin Gradle files
        run: scripts/patch-android-plugin-gradle.sh

      - name: Run release quality gates
        run: |
          ruby -e 'require "yaml"; ARGV.each { |f| YAML.load_file(f); puts "workflow-yaml-ok #{f}" }' \
            .github/workflows/airo-tv-release.yml \
            .github/workflows/release-orchestrator.yml
          bash -n scripts/build-tv.sh scripts/check-android-tv-release.sh scripts/patch-android-plugin-gradle.sh
          python3 -m py_compile scripts/generate-release-manifest.py scripts/generate-release-qualification-report.py
          scripts/test-generate-release-manifest.sh
          scripts/test-generate-release-qualification-report.sh
          scripts/check-android-tv-release.sh
          cd app
          flutter analyze lib/core/app/tv_router.dart lib/main_tv.dart test/core/app/tv_router_test.dart test/main_tv_debug_playlist_test.dart --no-fatal-infos --no-fatal-warnings
          flutter test test/core/app/tv_router_test.dart test/main_tv_debug_playlist_test.dart --reporter=compact
          cd ../packages/feature_iptv
          flutter analyze lib test --no-fatal-infos --no-fatal-warnings
          flutter test test/iptv/presentation/screens/iptv_screen_test.dart test/iptv/presentation/tv/iptv_tv_screen_test.dart test/iptv/iptv_cast_ui_test.dart test/iptv/iptv_cast_notifier_test.dart --reporter=compact
          cd ../platform_player
          flutter analyze lib/src/services/flutter_chrome_cast_controller.dart test/flutter_chrome_cast_controller_test.dart --no-fatal-infos --no-fatal-warnings
          flutter test test/flutter_chrome_cast_controller_test.dart --reporter=compact
          cd ../..
          git diff --check

      - name: Build Android TV APK
        run: |
          cd app
          export GRADLE_OPTS="-Dorg.gradle.watch.fs=false -Xmx4g -Dorg.gradle.parallel=true"
          flutter build apk --release \
            --target=lib/main_tv.dart \
            --dart-define=APP_VARIANT=tv \
            --dart-define=APP_PLATFORM=androidTv \
            --build-name="$BUILD_NAME" \
            --build-number="$BUILD_NUMBER" \
            --target-platform=android-arm64 \
            --tree-shake-icons \
            --split-debug-info=build/debug-info-tv \
            --obfuscate
          cp build/app/outputs/flutter-apk/app-release.apk build/airo-tv-canonical-arm64.apk

      - name: Build Android TV AAB
        run: |
          cd app
          export GRADLE_OPTS="-Dorg.gradle.watch.fs=false -Xmx4g -Dorg.gradle.parallel=true"
          flutter build appbundle --release \
            --target=lib/main_tv.dart \
            --dart-define=APP_VARIANT=tv \
            --dart-define=APP_PLATFORM=androidTv \
            --build-name="$BUILD_NAME" \
            --build-number="$BUILD_NUMBER" \
            --tree-shake-icons \
            --split-debug-info=build/debug-info-tv \
            --obfuscate

      - name: Build Android TV ABI split APKs
        run: |
          cd app
          export GRADLE_OPTS="-Dorg.gradle.watch.fs=false -Xmx4g -Dorg.gradle.parallel=true"
          flutter build apk --release \
            --target=lib/main_tv.dart \
            --dart-define=APP_VARIANT=tv \
            --dart-define=APP_PLATFORM=androidTv \
            --build-name="$BUILD_NAME" \
            --build-number="$BUILD_NUMBER" \
            --split-per-abi \
            --tree-shake-icons \
            --split-debug-info=build/debug-info-tv \
            --obfuscate

      - name: Verify release artifacts
        env:
          AIRO_TV_RELEASE_APK: app/build/airo-tv-canonical-arm64.apk
          AIRO_TV_RELEASE_AAB: app/build/app/outputs/bundle/release/app-release.aab
        run: scripts/check-android-tv-release.sh

      - name: Stage named release artifacts
        run: |
          mkdir -p release-artifacts
          cp app/build/airo-tv-canonical-arm64.apk "release-artifacts/Airo-TV-${BUILD_NAME}.apk"
          cp app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk "release-artifacts/Airo-TV-${BUILD_NAME}-arm64-v8a.apk"
          cp app/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk "release-artifacts/Airo-TV-${BUILD_NAME}-armeabi-v7a.apk"
          cp app/build/app/outputs/flutter-apk/app-x86_64-release.apk "release-artifacts/Airo-TV-${BUILD_NAME}-x86_64.apk"
          cp app/build/app/outputs/bundle/release/app-release.aab "release-artifacts/Airo-TV-${BUILD_NAME}-Play-Store.aab"
          cp docs/release/AIRO_TV_RELEASE_TEMPLATE.md "release-artifacts/Airo-TV-${BUILD_NAME}-Release-Template.md"
          cp docs/release/AIRO_TV_MEDIA_ASSETS.md "release-artifacts/Airo-TV-${BUILD_NAME}-Media-Checklist.md"
          scripts/generate-release-manifest.py \
            --artifacts-dir release-artifacts \
            --profile-id tv \
            --version "$BUILD_NAME" \
            --build-number "$BUILD_NUMBER" \
            --source-ref "${{ needs.prepare-release-branch.outputs.release_ref || github.ref_name }}" \
            --source-sha "$GITHUB_SHA" \
            --workflow-name "$GITHUB_WORKFLOW" \
            --workflow-run "$GITHUB_RUN_ID" \
            --workflow-run-attempt "$GITHUB_RUN_ATTEMPT" \
            --repository "$GITHUB_REPOSITORY"
          mv release-artifacts/Release-Manifest.json "release-artifacts/Airo-TV-${BUILD_NAME}-Release-Manifest.json"
          ls -lh release-artifacts
          cat release-artifacts/SHA256SUMS
          cat "release-artifacts/Airo-TV-${BUILD_NAME}-Release-Manifest.json"
          {
            echo "# Airo TV release artifacts"
            echo ""
            echo "| Asset | Visibility | Purpose |"
            echo "| --- | --- | --- |"
            echo "| Airo-TV-${BUILD_NAME}.apk | Public/direct install | Android TV and compatible Fire TV testing |"
            echo "| Airo-TV-${BUILD_NAME}-arm64-v8a.apk | Public/direct install | 64-bit ARM Android TV devices |"
            echo "| Airo-TV-${BUILD_NAME}-armeabi-v7a.apk | Public/direct install | 32-bit ARM Android TV devices |"
            echo "| Airo-TV-${BUILD_NAME}-x86_64.apk | Public/direct install | x86_64 emulator/Chromebook validation |"
            echo "| Airo-TV-${BUILD_NAME}-Play-Store.aab | Store upload / draft release evidence | Google Play TV upload input |"
            echo "| SHA256SUMS | Public/internal verification | Checksum evidence after final renaming |"
            echo "| Airo-TV-${BUILD_NAME}-Release-Manifest.json | Public/internal verification | Profile, package, source ref, workflow run, and checksum mapping |"
            echo "| airo-tv-debug-info-${RELEASE_VERSION} | Restricted internal artifact | Obfuscation symbol lookup |"
            echo ""
            echo "Policy: docs/release/V2_DISTRIBUTION_MATRIX.md"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Airo TV release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: airo-tv-release-${{ env.RELEASE_VERSION }}
          path: release-artifacts/
          retention-days: 30

      - name: Upload obfuscation symbols
        uses: actions/upload-artifact@v7
        with:
          name: airo-tv-debug-info-${{ env.RELEASE_VERSION }}
          path: app/build/debug-info-tv/
          retention-days: 90

  play-upload:
    name: Upload Airo TV to Play testing track
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [prepare-release-branch, build-tv]
    if: (github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call') && (inputs.play_track || github.event.inputs.play_track) != 'none'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare-release-branch.outputs.release_ref || github.ref }}

      - name: Normalize release artifact label
        run: |
          release_version="$(printf '%s' "$RELEASE_VERSION" | sed 's/[^A-Za-z0-9._-]/-/g')"
          echo "RELEASE_VERSION=$release_version" >> "$GITHUB_ENV"

      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          name: airo-tv-release-${{ env.RELEASE_VERSION }}
          path: release-artifacts

      - name: Configure Play service account
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          if [[ -z "$GOOGLE_PLAY_SERVICE_ACCOUNT_JSON" ]]; then
            echo "::error::GOOGLE_PLAY_SERVICE_ACCOUNT_JSON is required to upload to Google Play."
            exit 1
          fi
          echo "$GOOGLE_PLAY_SERVICE_ACCOUNT_JSON" > app/android/play-store-credentials.json
          chmod 600 app/android/play-store-credentials.json

      - name: Upload to Google Play
        working-directory: app/android
        env:
          PLAY_TRACK: ${{ inputs.play_track || github.event.inputs.play_track }}
          SUPPLY_PACKAGE_NAME: io.airo.app.tv
          SUPPLY_JSON_KEY: play-store-credentials.json
        run: |
          if [[ -z "$SUPPLY_PACKAGE_NAME" ]]; then
            echo "::error::SUPPLY_PACKAGE_NAME is required for TV Play upload."
            exit 1
          fi
          if [[ -z "$PLAY_TRACK" || "$PLAY_TRACK" == "none" ]]; then
            echo "::error::A real Play track is required for TV upload."
            exit 1
          fi
          gem install fastlane --no-document
          fastlane supply \
            --aab "../../release-artifacts/Airo-TV-${BUILD_NAME}-Play-Store.aab" \
            --track "$PLAY_TRACK" \
            --package_name "$SUPPLY_PACKAGE_NAME" \
            --json_key "$SUPPLY_JSON_KEY" \
            --skip_upload_metadata true \
            --skip_upload_images true \
            --skip_upload_screenshots true

          {
            echo "# TV Play upload"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Package | $SUPPLY_PACKAGE_NAME |"
            echo "| Track | $PLAY_TRACK |"
            echo "| AAB | Airo-TV-${BUILD_NAME}-Play-Store.aab |"
            echo "| Play Console | https://play.google.com/console/u/0/developers/app/$SUPPLY_PACKAGE_NAME/tracks/$PLAY_TRACK |"
          } >> "$GITHUB_STEP_SUMMARY"

  firebase-distribution:
    name: Upload Airo TV to Firebase App Distribution
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [prepare-release-branch, build-tv]
    if: (github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call') && (inputs.firebase_distribution || github.event.inputs.firebase_distribution) == 'upload'
    permissions:
      contents: read
    outputs:
      status: ${{ steps.firebase_result.outputs.status }}
      url: ${{ steps.firebase_result.outputs.url }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare-release-branch.outputs.release_ref || github.ref }}

      - name: Normalize release artifact label
        run: |
          release_version="$(printf '%s' "$RELEASE_VERSION" | sed 's/[^A-Za-z0-9._-]/-/g')"
          echo "RELEASE_VERSION=$release_version" >> "$GITHUB_ENV"

      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          name: airo-tv-release-${{ env.RELEASE_VERSION }}
          path: release-artifacts

      - name: Configure Firebase service account
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [[ -z "$FIREBASE_SERVICE_ACCOUNT_JSON" ]]; then
            echo "::error::FIREBASE_SERVICE_ACCOUNT_JSON is required for Firebase App Distribution upload."
            exit 1
          fi
          echo "$FIREBASE_SERVICE_ACCOUNT_JSON" > firebase-service-account.json
          chmod 600 firebase-service-account.json

      - name: Upload to Firebase App Distribution
        id: firebase_result
        env:
          FIREBASE_APP_ID: ${{ inputs.firebase_app_id || github.event.inputs.firebase_app_id }}
          FIREBASE_TESTER_GROUPS: ${{ inputs.firebase_tester_groups || github.event.inputs.firebase_tester_groups }}
          GOOGLE_APPLICATION_CREDENTIALS: firebase-service-account.json
        run: |
          apk_name="Airo-TV-${BUILD_NAME}.apk"
          apk_path="release-artifacts/$apk_name"
          manifest_path="release-artifacts/Airo-TV-${BUILD_NAME}-Release-Manifest.json"

          if [[ -z "$FIREBASE_APP_ID" ]]; then
            echo "::error::firebase_app_id is required when Firebase distribution mode is upload."
            exit 1
          fi
          if [[ -z "$FIREBASE_TESTER_GROUPS" ]]; then
            echo "::error::firebase_tester_groups is required when Firebase distribution mode is upload."
            exit 1
          fi
          if [[ ! -f "$apk_path" ]]; then
            echo "::error::Expected TV APK not found: $apk_path"
            exit 1
          fi
          if [[ ! -f "$manifest_path" ]]; then
            echo "::error::Expected TV release manifest not found: $manifest_path"
            exit 1
          fi

          python3 - "$apk_name" "$manifest_path" > firebase-release-notes.md <<'PY'
          import json
          import sys

          apk_name, manifest_path = sys.argv[1:]
          manifest = json.load(open(manifest_path, encoding="utf-8"))
          artifact = next(item for item in manifest["artifacts"] if item["filename"] == apk_name)
          print(f"Airo TV {artifact['version']} ({artifact['buildNumber']})")
          print("")
          print(f"Package: {artifact['packageId']}")
          print(f"Artifact: {artifact['filename']}")
          print(f"SHA256: {artifact['sha256']}")
          print(f"Source: {manifest['source']['ref']} @ {manifest['source']['sha']}")
          PY

          npm install -g firebase-tools
          firebase appdistribution:distribute "$apk_path" \
            --app "$FIREBASE_APP_ID" \
            --groups "$FIREBASE_TESTER_GROUPS" \
            --release-notes-file firebase-release-notes.md \
            --json | tee firebase-result.json

          url="$(python3 - firebase-result.json <<'PY'
          import json
          import sys

          try:
              data = json.load(open(sys.argv[1], encoding="utf-8"))
          except Exception:
              print("")
              raise SystemExit
          result = data.get("result") if isinstance(data, dict) else None
          if not isinstance(result, dict):
              result = data if isinstance(data, dict) else {}
          print(result.get("firebase_console_uri") or result.get("testing_uri") or result.get("binary_download_uri") or "")
          PY
          )"

          {
            echo "status=uploaded"
            echo "url=$url"
          } >> "$GITHUB_OUTPUT"

          {
            echo "# TV Firebase App Distribution"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Package | io.airo.app.tv |"
            echo "| Firebase app | $FIREBASE_APP_ID |"
            echo "| Tester groups | $FIREBASE_TESTER_GROUPS |"
            echo "| APK | $apk_name |"
            if [[ -n "$url" ]]; then
              echo "| Result | $url |"
            else
              echo "| Result | Uploaded; Firebase CLI did not return a URL |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  github-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [prepare-release-branch, build-tv]
    if: (github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call') && (inputs.publish_github_release == true || github.event.inputs.publish_github_release == 'true')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare-release-branch.outputs.release_ref || inputs.release_ref || github.event.inputs.release_ref || 'v2' }}

      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          name: airo-tv-release-${{ env.RELEASE_VERSION }}
          path: release-artifacts

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ env.RELEASE_VERSION }}
          RELEASE_BRANCH: ${{ needs.prepare-release-branch.outputs.release_ref || inputs.release_branch || github.event.inputs.release_branch || 'release/airo-tv-v0.0.2' }}
          SIGNING_CERT: ${{ needs.build-tv.outputs.signing_cert }}
        run: |
          case "$SIGNING_CERT" in
            production)
              signing_note="Signed with the production Android release keystore. Upgrades cleanly over prior production-signed releases." ;;
            dogfood-stable)
              signing_note="Signed with the stable dogfood keystore. Upgrades cleanly over other dogfood-signed builds, but NOT over production-signed releases." ;;
            *)
              signing_note="Signed with an ephemeral CI-validation keystore generated for this run only. This build will NOT install over any other RC/CI build; uninstall the previous build first." ;;
          esac
          notes=$(mktemp)
          cat > "$notes" <<NOTES
          # Airo TV ${BUILD_NAME}

          Airo TV ${BUILD_NAME} is a release-management and trust-readiness update for the Android TV variant of Airo.

          ## Highlights

          - Published clean release asset names for APK and Play Store AAB downloads.
          - Added SHA256 checksum publishing for release artifacts.
          - Added structured release notes for Airo TV releases.
          - Documented privacy, security, threat model, roadmap, architecture, and feature matrix.
          - Updated public download links and release documentation.

          ## New Features

          ### IPTV

          - Supports user-supplied M3U playlist URLs.
          - Keeps IPTV content responsibility with the user; Airo TV does not bundle channels or playlists.

          ### Search

          - Supports channel search by channel name.
          - Includes validation coverage for Music India search/play.

          ### Android TV

          - Supports package io.airo.app.tv.
          - Supports standard launcher and Leanback launcher entry points.
          - Maintains Pixel/mobile fallback layout coverage.

          ### Chromecast

          - Supports Cast discovery state messaging.
          - Supports play, pause, stop, reload, new session, and volume controls.

          ### Playback

          - Supports IPTV channel playback from authorized playlist URLs.

          ### User Interface

          - Documents required screenshots for Android TV Home, Player, Search, Playlist Import, Settings, Chromecast, and error states.
          - Maintains accessibility label and tooltip verification for key controls.

          ## Improvements

          - Release artifacts use clean user-facing names.
          - Release assets include SHA256SUMS for download verification.
          - Release notes follow a stable template for future Airo TV versions.

          ## Bug Fixes

          - Fixed broken and misleading Airo TV download references that pointed to generic or missing release assets.
          - Removed debug-looking public APK names from the Airo TV release flow.

          ## Performance

          - The Android TV build continues to use the lightweight TV pubspec to avoid bundling unrelated heavy dependencies.
          - Release builds continue to use icon tree-shaking and obfuscation with split debug information.

          ## Developer Changes

          - Updated the Airo TV release workflow defaults for ${BUILD_NAME}.
          - Added checksum generation to the release pipeline.
          - Added reusable release documentation for trust and release readiness.

          ## Breaking Changes

          No breaking changes.

          ## Known Limitations

          - No EPG support.
          - No recording.
          - No favorites sync.
          - No cloud playlists.
          - No multiple playlist merge.
          - No bundled IPTV channels or media content.
          - Cast discovery depends on _googlecast._tcp advertising and port 8009 reachability on the local network.
          - Screenshot and demo-video assets must be captured from final release devices before store submission.

          ## Installation

          ### APK

          Download Airo-TV-${BUILD_NAME}.apk from Assets.

          ### Play Store

          Upload Airo-TV-${BUILD_NAME}-Play-Store.aab to Play Console.

          ## Legal Notice

          This application is an IPTV player.

          It does not provide television channels, media content, or playlists.

          Users are responsible for supplying legally authorized IPTV playlists.

          ## Signing

          ${signing_note}

          ## Checksums

          SHA256 checksums are published in the SHA256SUMS asset.

          \`\`\`text
          $(cat release-artifacts/SHA256SUMS)
          \`\`\`

          ## Contributors

          Generated by GitHub from commits included in the release.

          ## Full Changelog

          https://github.com/DevelopersCoffee/airo/compare/airo-tv-v0.0.1...${RELEASE_VERSION}
          NOTES
          gh release create "$RELEASE_VERSION" release-artifacts/* \
            --title "Airo TV ${BUILD_NAME}" \
            --target "$RELEASE_BRANCH" \
            --notes-file "$notes" \
            --repo DevelopersCoffee/airo

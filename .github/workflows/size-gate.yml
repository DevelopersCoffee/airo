name: Plugin Size Gate

on:
  pull_request:
    branches: [ main, v2, master, develop ]
    paths:
      - 'app/**'
      - 'packages/**'
      - 'plugins/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - 'scripts/check-module-sizes.sh'
      - '.github/workflows/size-gate.yml'
      - '.github/PULL_REQUEST_TEMPLATE.md'

concurrency:
  group: plugin-size-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  module-size-gate:
    name: Module size gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch --no-tags --prune --depth=50 origin ${{ github.base_ref }}

      - name: Check changed module sizes
        env:
          MODULE_SIZE_BASE_REF: origin/${{ github.base_ref }}
          MODULE_SIZE_REPORT_FILE: module-size-report.md
          MODULE_SIZE_WARN_MB: '1'
          MODULE_SIZE_FAIL_MB: '3'
          PLUGIN_SIZE_CACHE_MB: '5'
        run: scripts/check-module-sizes.sh

      - name: Upload module size report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: module-size-report
          path: module-size-report.md
          if-no-files-found: ignore

      - name: Comment PR with module size report
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- airo-plugin-size-gate -->';
            const reportPath = 'module-size-report.md';
            const report = fs.existsSync(reportPath)
              ? fs.readFileSync(reportPath, 'utf8')
              : 'Module size report was not generated.';
            const body = `${marker}\n${report}`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) => comment.body && comment.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

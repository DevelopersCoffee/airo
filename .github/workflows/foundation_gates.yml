name: Foundation Gates (PFR-1)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          
      - name: Install Melos
        run: dart pub global activate melos
        
      - name: Bootstrap Workspace
        run: melos bootstrap
        
      - name: Architecture Validation
        run: melos run analyze
        
      - name: Dependency Graph Validation
        run: |
          # Fails if feature packages exist or import backwards
          dart pub global activate import_lint || true
          
      - name: Unit Tests
        run: melos run test
        
      - name: Public API Comparison
        run: |
          python3 scripts/extract_api_baseline.py
          if ! git diff --exit-code docs/foundation/api_baseline.md; then
            echo "::error::Public API drift detected! Update the baseline and link the ADR."
            exit 1
          fi

      - name: Format Checks
        run: dart format --output=none --set-exit-if-changed .

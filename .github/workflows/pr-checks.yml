# =============================================================================
# PR Checks Workflow
# =============================================================================
# Automated PR checks are intentionally disabled. Release validation is performed
# by .github/workflows/ci.yml when a v* release tag is pushed.
# =============================================================================
name: PR Checks

on:
  workflow_dispatch:

jobs:
  release-only-policy:
    runs-on: ubuntu-latest
    steps:
      - name: Explain release-only check policy
        run: |
          echo "Automated PR checks are disabled."
          echo "Cut a v* release tag to run the release validation checks."

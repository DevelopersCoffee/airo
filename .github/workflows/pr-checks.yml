# =============================================================================
# PR Checks Workflow - Optimized for Fast Feedback
# =============================================================================
# This workflow is designed to provide fast feedback on PRs (<5 minutes)
# More comprehensive checks (coverage, security scans, builds) run in the
# release workflow or on push to main.
# =============================================================================
name: PR Checks

on:
  pull_request:
    branches: [ main, master, develop ]

# Cancel any in-progress runs for the same PR
concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.44.4'

jobs:
  # ============================================
  # PR Validation (fast checks) - ~15 seconds
  # ============================================
  pr-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check file changes
        uses: dorny/paths-filter@v4
        id: changes
        with:
          filters: |
            flutter:
              - 'app/**'
              - 'packages/**'
            docs:
              - '**.md'

      - name: Enforce docs completeness
        env:
          AIRO_DOCS_BYPASS: ${{ contains(join(github.event.pull_request.labels.*.name, ' '), 'docs-not-needed') && 'true' || 'false' }}
          AIRO_DOCS_BASE: ${{ github.event.pull_request.base.sha }}
          AIRO_DOCS_HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          chmod +x scripts/check-docs-completeness.sh
          scripts/check-docs-completeness.sh \
            --base "$AIRO_DOCS_BASE" \
            --head "$AIRO_DOCS_HEAD"

      - name: Enforce bundled model artifact guardrail
        run: |
          chmod +x scripts/check-bundled-model-artifacts.sh
          scripts/check-bundled-model-artifacts.sh

      - name: Validate platform build profiles
        run: |
          chmod +x scripts/check-build-profiles.py scripts/generate-release-manifest.py scripts/test-generate-release-manifest.sh scripts/generate-release-qualification-report.py scripts/test-generate-release-qualification-report.sh
          ruby -e 'require "yaml"; ARGV.each { |f| YAML.load_file(f); puts "ok #{f}" }' \
            .github/workflows/v2-release-orchestrator.yml \
            .github/workflows/airo-tv-release.yml \
            .github/workflows/airo-mobile-tablet-release.yml
          python3 -m py_compile scripts/check-build-profiles.py scripts/generate-release-manifest.py scripts/generate-release-qualification-report.py
          scripts/check-build-profiles.py
          scripts/test-generate-release-manifest.sh
          scripts/test-generate-release-qualification-report.sh

      - name: Validate Engineering Council module manifests
        run: |
          chmod +x scripts/check-module-manifests.py scripts/test-check-module-manifests.sh
          ruby -e 'require "yaml"; Dir.glob("packages/*/module.yaml").each { |f| YAML.load_file(f); puts "yaml ok #{f}" }'
          scripts/test-check-module-manifests.sh
          scripts/check-module-manifests.py

  # ============================================
  # Code Quality (analyze, format) - ~2 minutes
  # ============================================
  code-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.pub-cache
            app/.dart_tool
            packages/*/.dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Get dependencies (parallel)
        run: |
          (cd packages/core_domain && flutter pub get) &
          (cd packages/core_ui && flutter pub get) &
          (cd packages/core_data && flutter pub get) &
          (cd packages/core_ai && flutter pub get) &
          (cd packages/core_auth && flutter pub get) &
          wait
          cd app && flutter pub get

      - name: Run code generation
        run: |
          cd app
          dart run build_runner clean
          dart run build_runner build --delete-conflicting-outputs

      - name: Configure firebase_options.dart
        env:
          FIREBASE_OPTIONS_DART_B64: ${{ secrets.FIREBASE_OPTIONS_DART_B64 }}
        run: |
          cd app
          if [[ -n "$FIREBASE_OPTIONS_DART_B64" ]]; then
            echo "$FIREBASE_OPTIONS_DART_B64" | base64 -d > lib/firebase_options.dart
            echo "Using FIREBASE_OPTIONS_DART_B64."
          else
            cp lib/firebase_options.dart.template lib/firebase_options.dart
            echo "::warning::FIREBASE_OPTIONS_DART_B64 is not set; using placeholder firebase_options.dart."
          fi

      - name: Run Flutter Analyze
        run: |
          cd app
          flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Check formatting
        run: |
          cd app
          find lib test -name "*.dart" ! -name "*.g.dart" ! -name "*.freezed.dart" -print0 | xargs -0 dart format --set-exit-if-changed

  # ============================================
  # Fast Unit Tests (core packages only) - ~2 minutes
  # App tests and coverage moved to release workflow
  # ============================================
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.pub-cache
            packages/*/.dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Get core package dependencies (parallel)
        run: |
          (cd packages/core_domain && flutter pub get) &
          (cd packages/core_ui && flutter pub get) &
          (cd packages/core_data && flutter pub get) &
          (cd packages/core_ai && flutter pub get) &
          (cd packages/core_auth && flutter pub get) &
          wait

      - name: Run core package tests (parallel)
        run: |
          echo "Running core package tests in parallel..."
          (cd packages/core_domain && flutter test --reporter=compact) &
          (cd packages/core_data && flutter test --reporter=compact) &
          (cd packages/core_ai && flutter test --reporter=compact) &
          (cd packages/core_auth && flutter test --reporter=compact) &
          wait
          echo "All core package tests completed!"

  # ============================================
  # PR Summary Comment
  # ============================================
  pr-summary:
    runs-on: ubuntu-latest
    needs: [pr-validation, code-quality, tests]
    if: always()
    steps:
      - name: Comment PR with summary
        uses: actions/github-script@v9
        with:
          script: |
            const prValidation = '${{ needs.pr-validation.result }}';
            const codeQuality = '${{ needs.code-quality.result }}';
            const tests = '${{ needs.tests.result }}';

            const getEmoji = (status) => status === 'success' ? '✅' : status === 'skipped' ? '⏭️' : '❌';

            const comment = `## 🚀 PR Quick Check Summary

            | Check | Status | Description |
            |-------|--------|-------------|
            | PR Validation | ${getEmoji(prValidation)} ${prValidation} | Title format, docs, bundled model guardrail |
            | Code Quality | ${getEmoji(codeQuality)} ${codeQuality} | Analyze, formatting |
            | Core Tests | ${getEmoji(tests)} ${tests} | Core package unit tests |

            > 💡 **Note:** Full app tests, coverage reports, and security scans run on merge to main.

            [View Details](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

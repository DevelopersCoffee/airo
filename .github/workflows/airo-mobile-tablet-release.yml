name: Airo Mobile and Tablet Release

on:
  workflow_call:
    outputs:
      firebase_distribution_status:
        description: 'Firebase App Distribution result status'
        value: ${{ jobs.firebase-distribution.outputs.status }}
      firebase_distribution_url:
        description: 'Firebase App Distribution console URL when available'
        value: ${{ jobs.firebase-distribution.outputs.url }}
      signing_cert:
        description: 'Which cert signed the mobile/tablet APK/AAB: production, dogfood-stable, or ephemeral-ci-validation'
        value: ${{ jobs.build-mobile-tablet.outputs.signing_cert }}
    inputs:
      profile:
        description: 'Mobile/tablet v2 profile to build'
        required: true
        type: string
      version:
        description: 'Artifact and release version label'
        required: true
        type: string
      build_name:
        description: 'Android versionName, for example 2.0.0'
        required: true
        type: string
      build_number:
        description: 'Android versionCode, must increase for every Play upload'
        required: true
        type: string
      release_ref:
        description: 'Git ref to release; must contain latest origin/main'
        required: true
        type: string
      production_signing:
        description: 'Require production Android signing and Firebase secrets'
        required: true
        type: boolean
      play_track:
        description: 'Optional Play upload track'
        required: true
        type: string
      firebase_distribution:
        description: 'Firebase App Distribution mode'
        required: true
        type: string
      firebase_app_id:
        description: 'Firebase App Distribution app ID for the selected profile'
        required: false
        type: string
      firebase_tester_groups:
        description: 'Comma-separated Firebase tester groups'
        required: false
        type: string
  workflow_dispatch:
    inputs:
      profile:
        description: 'Mobile/tablet v2 profile to build'
        required: true
        default: full
        type: choice
        options:
          - full
      version:
        description: 'Artifact and release version label'
        required: true
        default: v0.0.5
      build_name:
        description: 'Android versionName, for example 0.0.5'
        required: true
        default: 0.0.5
      build_number:
        description: 'Android versionCode, must increase for every Play upload'
        required: true
        default: '7'
      release_ref:
        description: 'Git ref to release; must contain latest origin/main'
        required: true
        default: main
      production_signing:
        description: 'Require production Android signing and Firebase secrets'
        required: true
        default: false
        type: boolean
      play_track:
        description: 'Optional Play upload track'
        required: true
        default: none
        type: choice
        options:
          - none
          - internal
          - alpha
          - beta
          - production
      firebase_distribution:
        description: 'Firebase App Distribution mode'
        required: true
        default: none
        type: choice
        options:
          - none
          - upload
      firebase_app_id:
        description: 'Firebase App Distribution app ID for this profile'
        required: false
        default: ''
      firebase_tester_groups:
        description: 'Comma-separated Firebase tester groups'
        required: false
        default: ''

concurrency:
  group: airo-mobile-tablet-release-${{ github.ref }}-${{ inputs.profile || github.event.inputs.profile || 'manual' }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FLUTTER_VERSION: '3.44.4'
  RELEASE_VERSION: ${{ inputs.version || github.event.inputs.version || github.ref_name }}
  BUILD_NAME: ${{ inputs.build_name || github.event.inputs.build_name || '0.0.5' }}
  BUILD_NUMBER: ${{ inputs.build_number || github.event.inputs.build_number || '7' }}
  PROFILE: ${{ inputs.profile || github.event.inputs.profile || 'full' }}

jobs:
  prepare-release-ref:
    name: Validate mobile/tablet release ref
    runs-on: ubuntu-latest
    outputs:
      release_ref: ${{ steps.release_ref.outputs.ref }}
      release_sha: ${{ steps.release_ref.outputs.sha }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ inputs.release_ref || github.event.inputs.release_ref || github.ref }}

      - name: Resolve and validate mainline release ref
        id: release_ref
        env:
          RELEASE_REF: ${{ inputs.release_ref || github.event.inputs.release_ref || github.ref }}
        run: |
          git fetch origin main v1_bkp --tags

          if git rev-parse --verify "origin/$RELEASE_REF^{commit}" >/dev/null 2>&1; then
            release_commit="$(git rev-parse "origin/$RELEASE_REF^{commit}")"
          elif git rev-parse --verify "$RELEASE_REF^{commit}" >/dev/null 2>&1; then
            release_commit="$(git rev-parse "$RELEASE_REF^{commit}")"
          else
            echo "::error::Cannot resolve release_ref: $RELEASE_REF"
            exit 1
          fi

          if ! git merge-base --is-ancestor origin/main "$release_commit"; then
            echo "::error::Release ref $RELEASE_REF does not contain latest origin/main."
            exit 1
          fi

          echo "ref=$RELEASE_REF" >> "$GITHUB_OUTPUT"
          echo "sha=$release_commit" >> "$GITHUB_OUTPUT"

      - name: Validate Firebase distribution inputs
        env:
          FIREBASE_DISTRIBUTION: ${{ inputs.firebase_distribution || github.event.inputs.firebase_distribution || 'none' }}
          FIREBASE_APP_ID: ${{ inputs.firebase_app_id || github.event.inputs.firebase_app_id }}
          FIREBASE_TESTER_GROUPS: ${{ inputs.firebase_tester_groups || github.event.inputs.firebase_tester_groups }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          case "$FIREBASE_DISTRIBUTION" in
            none|upload) ;;
            *)
              echo "::error::Unsupported Firebase distribution mode: $FIREBASE_DISTRIBUTION"
              exit 1
              ;;
          esac

          if [[ "$FIREBASE_DISTRIBUTION" == "upload" ]]; then
            missing=0
            for name in FIREBASE_APP_ID FIREBASE_TESTER_GROUPS FIREBASE_SERVICE_ACCOUNT_JSON; do
              if [[ -z "${!name}" ]]; then
                echo "::error::$name is required when Firebase distribution mode is upload."
                missing=1
              fi
            done
            [[ "$missing" -eq 0 ]] || exit 1
          fi

  build-mobile-tablet:
    name: Build ${{ inputs.profile || github.event.inputs.profile || 'mobile/tablet' }} APK and AAB
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [prepare-release-ref]
    outputs:
      signing_cert: ${{ steps.android_signing.outputs.signing_cert }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare-release-ref.outputs.release_sha }}

      - name: Resolve mobile/tablet profile metadata
        run: |
          release_version="$(printf '%s' "$RELEASE_VERSION" | sed 's/[^A-Za-z0-9._-]/-/g')"
          echo "RELEASE_VERSION=$release_version" >> "$GITHUB_ENV"

          case "$PROFILE" in
            full)
              echo "TARGET_ENTRYPOINT=lib/main.dart" >> "$GITHUB_ENV"
              echo "PROFILE_PUBSPEC=pubspec.yaml" >> "$GITHUB_ENV"
              echo "APP_VARIANT=full" >> "$GITHUB_ENV"
              echo "APP_PLATFORM=mobileFull" >> "$GITHUB_ENV"
              echo "PACKAGE_ID=io.airo.app" >> "$GITHUB_ENV"
              echo "ARTIFACT_PREFIX=Airo" >> "$GITHUB_ENV"
              ;;
            *)
              echo "::error::Unsupported mobile/tablet profile: $PROFILE"
              exit 1
              ;;
          esac

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.pub-cache
            app/.dart_tool
            packages/*/.dart_tool
          key: mobile-tablet-pub-${{ runner.os }}-${{ env.PROFILE }}-${{ hashFiles('**/pubspec.lock', 'app/pubspec.yaml') }}
          restore-keys: mobile-tablet-pub-${{ runner.os }}-${{ env.PROFILE }}-

      - name: Cache Gradle
        uses: actions/cache@v6
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: mobile-tablet-gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: mobile-tablet-gradle-${{ runner.os }}-

      - name: Configure Firebase for mobile/tablet build
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
          PRODUCTION_SIGNING: ${{ inputs.production_signing || github.event.inputs.production_signing || 'false' }}
        run: |
          cd app
          write_placeholder_config() {
            cat > android/app/google-services.json <<JSON
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "airo-mobile-ci-placeholder",
              "storage_bucket": "airo-mobile-ci-placeholder.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000000000",
                  "android_client_info": {
                    "package_name": "$PACKAGE_ID"
                  }
                },
                "oauth_client": [],
                "api_key": [
                  {
                    "current_key": "ci-placeholder"
                  }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              }
            ],
            "configuration_version": "1"
          }
          JSON
          }

          if [[ -n "$GOOGLE_SERVICES_JSON" ]]; then
            echo "$GOOGLE_SERVICES_JSON" | base64 -d > android/app/google-services.json
            if grep -q "\"package_name\"[[:space:]]*:[[:space:]]*\"$PACKAGE_ID\"" android/app/google-services.json; then
              echo "Using GOOGLE_SERVICES_JSON for $PACKAGE_ID."
            elif [[ "$PRODUCTION_SIGNING" == "true" ]]; then
              echo "::error::GOOGLE_SERVICES_JSON must include a Firebase Android client for $PACKAGE_ID."
              exit 1
            else
              echo "::warning::GOOGLE_SERVICES_JSON does not include $PACKAGE_ID; using placeholder Firebase config."
              write_placeholder_config
            fi
          elif [[ "$PRODUCTION_SIGNING" == "true" ]]; then
            echo "::error::GOOGLE_SERVICES_JSON is required for production-signed release builds."
            exit 1
          else
            echo "::warning::GOOGLE_SERVICES_JSON is not set; using placeholder Firebase config."
            write_placeholder_config
          fi

      - name: Configure firebase_options.dart
        env:
          FIREBASE_OPTIONS_DART_B64: ${{ secrets.FIREBASE_OPTIONS_DART_B64 }}
        run: |
          cd app
          if [[ -n "$FIREBASE_OPTIONS_DART_B64" ]]; then
            echo "$FIREBASE_OPTIONS_DART_B64" | base64 -d > lib/firebase_options.dart
            echo "Using FIREBASE_OPTIONS_DART_B64."
          else
            cp lib/firebase_options.dart.template lib/firebase_options.dart
            echo "::warning::FIREBASE_OPTIONS_DART_B64 is not set; using placeholder firebase_options.dart (Firebase init will be skipped at runtime)."
          fi

      - name: Configure Android signing
        id: android_signing
        env:
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          DOGFOOD_KEYSTORE_BASE64: ${{ secrets.DOGFOOD_KEYSTORE_BASE64 }}
          DOGFOOD_KEYSTORE_PASSWORD: ${{ secrets.DOGFOOD_KEYSTORE_PASSWORD }}
          DOGFOOD_KEY_ALIAS: ${{ secrets.DOGFOOD_KEY_ALIAS }}
          DOGFOOD_KEY_PASSWORD: ${{ secrets.DOGFOOD_KEY_PASSWORD }}
          PRODUCTION_SIGNING: ${{ inputs.production_signing || github.event.inputs.production_signing || 'false' }}
        run: |
          cd app/android
          if [[ "$PRODUCTION_SIGNING" == "true" ]]; then
            missing=0
            for name in ANDROID_RELEASE_KEYSTORE_BASE64 KEYSTORE_PASSWORD KEY_ALIAS KEY_PASSWORD; do
              if [[ -z "${!name}" ]]; then
                echo "::error::Missing required Android release signing secret: $name"
                missing=1
              fi
            done
            [[ "$missing" -eq 0 ]] || exit 1
            echo "$ANDROID_RELEASE_KEYSTORE_BASE64" | base64 -d > release.keystore
            {
              echo "storeFile=release.keystore"
              echo "storePassword=$KEYSTORE_PASSWORD"
              echo "keyAlias=$KEY_ALIAS"
              echo "keyPassword=$KEY_PASSWORD"
            } > key.properties
            echo "signing_cert=production" >> "$GITHUB_OUTPUT"
          elif [[ -n "$DOGFOOD_KEYSTORE_BASE64" ]]; then
            missing=0
            for name in DOGFOOD_KEYSTORE_BASE64 DOGFOOD_KEYSTORE_PASSWORD DOGFOOD_KEY_ALIAS DOGFOOD_KEY_PASSWORD; do
              if [[ -z "${!name}" ]]; then
                echo "::error::Missing required dogfood signing secret: $name"
                missing=1
              fi
            done
            [[ "$missing" -eq 0 ]] || exit 1
            echo "$DOGFOOD_KEYSTORE_BASE64" | base64 -d > dogfood.keystore
            {
              echo "storeFile=dogfood.keystore"
              echo "storePassword=$DOGFOOD_KEYSTORE_PASSWORD"
              echo "keyAlias=$DOGFOOD_KEY_ALIAS"
              echo "keyPassword=$DOGFOOD_KEY_PASSWORD"
            } > key.properties
            echo "signing_cert=dogfood-stable" >> "$GITHUB_OUTPUT"
          else
            # Ephemeral CI-validation cert: a fresh keystore is generated every run, so
            # each build has a different cert. Installing this build over any previous
            # RC/CI build fails with INSTALL_FAILED_UPDATE_INCOMPATIBLE. Configure the
            # DOGFOOD_KEYSTORE_BASE64 secret for RC installs that upgrade cleanly.
            echo "::warning::Signing with an ephemeral CI-validation keystore (regenerated every run). Installing this build over a previous RC/CI build will fail with INSTALL_FAILED_UPDATE_INCOMPATIBLE. Configure DOGFOOD_KEYSTORE_BASE64 for a stable dogfood signing cert."
            keytool -genkeypair \
              -v \
              -keystore ci-validation.keystore \
              -storepass ci-validation-password \
              -keypass ci-validation-password \
              -alias ci-validation \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Airo Mobile CI Validation,O=DevelopersCoffee,C=US"
            {
              echo "storeFile=ci-validation.keystore"
              echo "storePassword=ci-validation-password"
              echo "keyAlias=ci-validation"
              echo "keyPassword=ci-validation-password"
            } > key.properties
            echo "signing_cert=ephemeral-ci-validation" >> "$GITHUB_OUTPUT"
          fi
          chmod 600 *.keystore key.properties

      - name: Run repo-wide release quality gates
        run: |
          ruby -e 'require "yaml"; ARGV.each { |f| YAML.load_file(f); puts "workflow-yaml-ok #{f}" }' \
            .github/workflows/release-orchestrator.yml \
            .github/workflows/airo-tv-release.yml \
            .github/workflows/airo-mobile-tablet-release.yml
          bash -n scripts/patch-android-plugin-gradle.sh scripts/check-apk-size.sh
          python3 -m py_compile scripts/generate-release-manifest.py scripts/generate-release-qualification-report.py
          scripts/check-build-profiles.py
          scripts/test-generate-release-manifest.sh
          scripts/test-generate-release-qualification-report.sh

      - name: Apply mobile/tablet pubspec
        run: |
          cp app/pubspec.yaml app/pubspec.yaml.backup
          cp "app/$PROFILE_PUBSPEC" app/pubspec.yaml

      - name: Get dependencies
        run: |
          (cd packages/core_domain && flutter pub get) &
          (cd packages/core_ui && flutter pub get) &
          (cd packages/core_data && flutter pub get) &
          (cd packages/core_ai && flutter pub get) &
          (cd packages/core_auth && flutter pub get) &
          wait
          cd app && flutter pub get

      - name: Patch Android plugin Gradle files
        run: scripts/patch-android-plugin-gradle.sh

      - name: Run profile-specific quality gates
        run: |
          cd app
          flutter analyze "$TARGET_ENTRYPOINT" --no-fatal-infos --no-fatal-warnings
          cd ..
          git diff --check

      - name: Build mobile/tablet APK
        run: |
          cd app
          export GRADLE_OPTS="-Dorg.gradle.watch.fs=false -Xmx4g -Dorg.gradle.parallel=true"
          flutter build apk --release \
            --target="$TARGET_ENTRYPOINT" \
            --dart-define=APP_VARIANT="$APP_VARIANT" \
            --dart-define=APP_PLATFORM="$APP_PLATFORM" \
            --build-name="$BUILD_NAME" \
            --build-number="$BUILD_NUMBER" \
            --target-platform=android-arm64 \
            --tree-shake-icons \
            --split-debug-info="build/debug-info-$PROFILE" \
            --obfuscate
          mv build/app/outputs/flutter-apk/app-release.apk \
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk

      - name: Build mobile/tablet AAB
        run: |
          cd app
          export GRADLE_OPTS="-Dorg.gradle.watch.fs=false -Xmx4g -Dorg.gradle.parallel=true"
          flutter build appbundle --release \
            --target="$TARGET_ENTRYPOINT" \
            --dart-define=APP_VARIANT="$APP_VARIANT" \
            --dart-define=APP_PLATFORM="$APP_PLATFORM" \
            --build-name="$BUILD_NAME" \
            --build-number="$BUILD_NUMBER" \
            --tree-shake-icons \
            --split-debug-info="build/debug-info-$PROFILE" \
            --obfuscate

      - name: Check mobile/tablet APK size
        env:
          APK_SIZE_COMPONENT: ${{ env.PROFILE }}
          APK_SIZE_APK_GLOB: app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          APK_SIZE_REPORT_FILE: apk-size-${{ env.PROFILE }}.md
        run: scripts/check-apk-size.sh

      - name: Stage named release artifacts
        run: |
          mkdir -p release-artifacts
          apk_name="${ARTIFACT_PREFIX}-${BUILD_NAME}-${BUILD_NUMBER}-arm64.apk"
          aab_name="${ARTIFACT_PREFIX}-${BUILD_NAME}-${BUILD_NUMBER}-Play-Store.aab"
          cp app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk "release-artifacts/$apk_name"
          cp app/build/app/outputs/bundle/release/app-release.aab "release-artifacts/$aab_name"
          scripts/generate-release-manifest.py \
            --artifacts-dir release-artifacts \
            --profile-id "$PROFILE" \
            --version "$BUILD_NAME" \
            --build-number "$BUILD_NUMBER" \
            --source-ref "${{ needs.prepare-release-ref.outputs.release_ref }}" \
            --source-sha "${{ needs.prepare-release-ref.outputs.release_sha }}" \
            --workflow-name "$GITHUB_WORKFLOW" \
            --workflow-run "$GITHUB_RUN_ID" \
            --workflow-run-attempt "$GITHUB_RUN_ATTEMPT" \
            --repository "$GITHUB_REPOSITORY"
          mv release-artifacts/Release-Manifest.json "release-artifacts/${ARTIFACT_PREFIX}-${BUILD_NAME}-${BUILD_NUMBER}-Release-Manifest.json"

          python3 - "$PROFILE" "$PACKAGE_ID" "$BUILD_NAME" "$BUILD_NUMBER" "$apk_name" "$aab_name" "release-artifacts/${ARTIFACT_PREFIX}-${BUILD_NAME}-${BUILD_NUMBER}-Release-Manifest.json" <<'PY'
          import json
          import sys

          profile, package, version, build_number, apk_name, aab_name, manifest_path = sys.argv[1:]
          manifest = json.load(open(manifest_path, encoding="utf-8"))
          artifacts = {artifact["filename"]: artifact for artifact in manifest["artifacts"]}
          for filename in (apk_name, aab_name):
              artifact = artifacts[filename]
              assert artifact["profileId"] == profile
              assert artifact["packageId"] == package
              assert artifact["version"] == version
              assert artifact["buildNumber"] == build_number
              assert len(artifact["sha256"]) == 64
          assert artifacts[apk_name]["artifactType"] == "apk"
          assert artifacts[aab_name]["artifactType"] == "aab"
          PY

          grep -q "$apk_name" release-artifacts/SHA256SUMS
          grep -q "$aab_name" release-artifacts/SHA256SUMS
          ls -lh release-artifacts
          cat release-artifacts/SHA256SUMS
          {
            echo "# Airo mobile/tablet release artifacts"
            echo ""
            echo "| Asset | Visibility | Purpose |"
            echo "| --- | --- | --- |"
            echo "| $apk_name | Public/direct install | Mobile/tablet Android arm64 APK |"
            echo "| $aab_name | Store upload / draft release evidence | Google Play upload input |"
            echo "| SHA256SUMS | Public/internal verification | Checksum evidence after final renaming |"
            echo "| ${ARTIFACT_PREFIX}-${BUILD_NAME}-${BUILD_NUMBER}-Release-Manifest.json | Public/internal verification | Profile, package, source ref, workflow run, and checksum mapping |"
            echo "| airo-mobile-tablet-debug-info-${PROFILE}-${RELEASE_VERSION} | Restricted internal artifact | Obfuscation symbol lookup |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload mobile/tablet release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: airo-mobile-tablet-${{ env.PROFILE }}-${{ env.RELEASE_VERSION }}
          path: release-artifacts/
          retention-days: 30

      - name: Upload obfuscation symbols
        uses: actions/upload-artifact@v7
        with:
          name: airo-mobile-tablet-debug-info-${{ env.PROFILE }}-${{ env.RELEASE_VERSION }}
          path: app/build/debug-info-${{ env.PROFILE }}/
          retention-days: 90

  play-upload:
    name: Upload mobile/tablet to Play testing track
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [prepare-release-ref, build-mobile-tablet]
    if: (github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call') && (inputs.play_track || github.event.inputs.play_track) != 'none'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare-release-ref.outputs.release_sha }}

      - name: Resolve mobile/tablet profile metadata
        run: |
          release_version="$(printf '%s' "$RELEASE_VERSION" | sed 's/[^A-Za-z0-9._-]/-/g')"
          echo "RELEASE_VERSION=$release_version" >> "$GITHUB_ENV"

          case "$PROFILE" in
            full)
              echo "PACKAGE_ID=io.airo.app" >> "$GITHUB_ENV"
              echo "ARTIFACT_PREFIX=Airo" >> "$GITHUB_ENV"
              ;;
            *)
              echo "::error::Unsupported mobile/tablet profile for Play upload: $PROFILE"
              exit 1
              ;;
          esac

      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          name: airo-mobile-tablet-${{ env.PROFILE }}-${{ env.RELEASE_VERSION }}
          path: release-artifacts

      - name: Configure Play service account
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          if [[ -z "$GOOGLE_PLAY_SERVICE_ACCOUNT_JSON" ]]; then
            echo "::error::GOOGLE_PLAY_SERVICE_ACCOUNT_JSON is required to upload to Google Play."
            exit 1
          fi
          echo "$GOOGLE_PLAY_SERVICE_ACCOUNT_JSON" > app/android/play-store-credentials.json
          chmod 600 app/android/play-store-credentials.json

      - name: Upload to Google Play
        working-directory: app/android
        env:
          PLAY_TRACK: ${{ inputs.play_track || github.event.inputs.play_track }}
          SUPPLY_JSON_KEY: play-store-credentials.json
        run: |
          aab_path="../../release-artifacts/${ARTIFACT_PREFIX}-${BUILD_NAME}-${BUILD_NUMBER}-Play-Store.aab"
          if [[ -z "$PACKAGE_ID" ]]; then
            echo "::error::PACKAGE_ID was not resolved for $PROFILE."
            exit 1
          fi
          if [[ -z "$PLAY_TRACK" || "$PLAY_TRACK" == "none" ]]; then
            echo "::error::A real Play track is required for mobile/tablet upload."
            exit 1
          fi
          if [[ ! -f "$aab_path" ]]; then
            echo "::error::Expected mobile/tablet AAB not found: $aab_path"
            exit 1
          fi

          gem install fastlane --no-document
          fastlane supply \
            --aab "$aab_path" \
            --track "$PLAY_TRACK" \
            --package_name "$PACKAGE_ID" \
            --json_key "$SUPPLY_JSON_KEY" \
            --skip_upload_metadata true \
            --skip_upload_images true \
            --skip_upload_screenshots true

          {
            echo "# Mobile/tablet Play upload"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Profile | $PROFILE |"
            echo "| Package | $PACKAGE_ID |"
            echo "| Track | $PLAY_TRACK |"
            echo "| AAB | ${ARTIFACT_PREFIX}-${BUILD_NAME}-${BUILD_NUMBER}-Play-Store.aab |"
            echo "| Play Console | https://play.google.com/console/u/0/developers/app/$PACKAGE_ID/tracks/$PLAY_TRACK |"
          } >> "$GITHUB_STEP_SUMMARY"

  firebase-distribution:
    name: Upload mobile/tablet to Firebase App Distribution
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [prepare-release-ref, build-mobile-tablet]
    if: (github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call') && (inputs.firebase_distribution || github.event.inputs.firebase_distribution) == 'upload'
    permissions:
      contents: read
    outputs:
      status: ${{ steps.firebase_result.outputs.status }}
      url: ${{ steps.firebase_result.outputs.url }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare-release-ref.outputs.release_sha }}

      - name: Resolve mobile/tablet profile metadata
        run: |
          release_version="$(printf '%s' "$RELEASE_VERSION" | sed 's/[^A-Za-z0-9._-]/-/g')"
          echo "RELEASE_VERSION=$release_version" >> "$GITHUB_ENV"

          case "$PROFILE" in
            full)
              echo "PACKAGE_ID=io.airo.app" >> "$GITHUB_ENV"
              echo "ARTIFACT_PREFIX=Airo" >> "$GITHUB_ENV"
              ;;
            *)
              echo "::error::Unsupported mobile/tablet profile for Firebase distribution: $PROFILE"
              exit 1
              ;;
          esac

      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          name: airo-mobile-tablet-${{ env.PROFILE }}-${{ env.RELEASE_VERSION }}
          path: release-artifacts

      - name: Configure Firebase service account
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [[ -z "$FIREBASE_SERVICE_ACCOUNT_JSON" ]]; then
            echo "::error::FIREBASE_SERVICE_ACCOUNT_JSON is required for Firebase App Distribution upload."
            exit 1
          fi
          echo "$FIREBASE_SERVICE_ACCOUNT_JSON" > firebase-service-account.json
          chmod 600 firebase-service-account.json

      - name: Upload to Firebase App Distribution
        id: firebase_result
        env:
          FIREBASE_APP_ID: ${{ inputs.firebase_app_id || github.event.inputs.firebase_app_id }}
          FIREBASE_TESTER_GROUPS: ${{ inputs.firebase_tester_groups || github.event.inputs.firebase_tester_groups }}
          GOOGLE_APPLICATION_CREDENTIALS: firebase-service-account.json
        run: |
          apk_name="${ARTIFACT_PREFIX}-${BUILD_NAME}-${BUILD_NUMBER}-arm64.apk"
          apk_path="release-artifacts/$apk_name"
          manifest_path="release-artifacts/${ARTIFACT_PREFIX}-${BUILD_NAME}-${BUILD_NUMBER}-Release-Manifest.json"

          if [[ -z "$FIREBASE_APP_ID" ]]; then
            echo "::error::firebase_app_id is required when Firebase distribution mode is upload."
            exit 1
          fi
          if [[ -z "$FIREBASE_TESTER_GROUPS" ]]; then
            echo "::error::firebase_tester_groups is required when Firebase distribution mode is upload."
            exit 1
          fi
          if [[ ! -f "$apk_path" ]]; then
            echo "::error::Expected mobile/tablet APK not found: $apk_path"
            exit 1
          fi
          if [[ ! -f "$manifest_path" ]]; then
            echo "::error::Expected release manifest not found: $manifest_path"
            exit 1
          fi

          python3 - "$apk_name" "$manifest_path" > firebase-release-notes.md <<'PY'
          import json
          import sys

          apk_name, manifest_path = sys.argv[1:]
          manifest = json.load(open(manifest_path, encoding="utf-8"))
          artifact = next(item for item in manifest["artifacts"] if item["filename"] == apk_name)
          print(f"Airo {artifact['profileId']} {artifact['version']} ({artifact['buildNumber']})")
          print("")
          print(f"Package: {artifact['packageId']}")
          print(f"Artifact: {artifact['filename']}")
          print(f"SHA256: {artifact['sha256']}")
          print(f"Source: {manifest['source']['ref']} @ {manifest['source']['sha']}")
          PY

          npm install -g firebase-tools
          firebase appdistribution:distribute "$apk_path" \
            --app "$FIREBASE_APP_ID" \
            --groups "$FIREBASE_TESTER_GROUPS" \
            --release-notes-file firebase-release-notes.md \
            --json | tee firebase-result.json

          url="$(python3 - firebase-result.json <<'PY'
          import json
          import sys

          try:
              data = json.load(open(sys.argv[1], encoding="utf-8"))
          except Exception:
              print("")
              raise SystemExit
          result = data.get("result") if isinstance(data, dict) else None
          if not isinstance(result, dict):
              result = data if isinstance(data, dict) else {}
          print(result.get("firebase_console_uri") or result.get("testing_uri") or result.get("binary_download_uri") or "")
          PY
          )"

          {
            echo "status=uploaded"
            echo "url=$url"
          } >> "$GITHUB_OUTPUT"

          {
            echo "# Mobile/tablet Firebase App Distribution"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Profile | $PROFILE |"
            echo "| Package | $PACKAGE_ID |"
            echo "| Firebase app | $FIREBASE_APP_ID |"
            echo "| Tester groups | $FIREBASE_TESTER_GROUPS |"
            echo "| APK | $apk_name |"
            if [[ -n "$url" ]]; then
              echo "| Result | $url |"
            else
              echo "| Result | Uploaded; Firebase CLI did not return a URL |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

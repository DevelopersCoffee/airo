# =============================================================================
# Continuous Integration Workflow - Optimized
# =============================================================================
# On PR: Runs checks plus multi-platform APK size guardrails
# On Push to main: Runs comprehensive checks including app tests with coverage
# =============================================================================
name: Continuous Integration

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

# Cancel any in-progress runs for the same branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.41.4'

jobs:
  # ============================================
  # Code Quality (runs on all events)
  # ============================================
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache
            app/.dart_tool
            packages/*/.dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Get dependencies (parallel)
        run: |
          (cd packages/core_domain && flutter pub get) &
          (cd packages/core_ui && flutter pub get) &
          (cd packages/core_data && flutter pub get) &
          (cd packages/core_ai && flutter pub get) &
          (cd packages/core_auth && flutter pub get) &
          wait
          cd app && flutter pub get

      - name: Run code generation
        run: |
          cd app
          dart run build_runner clean
          dart run build_runner build --delete-conflicting-outputs

      - name: Run Flutter Analyze
        run: |
          cd app
          flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Check formatting
        run: |
          cd app
          find lib -name "*.dart" ! -name "*.g.dart" ! -name "*.freezed.dart" -print0 | xargs -0 dart format --set-exit-if-changed

  # ============================================
  # Core Package Tests (runs on all events - fast)
  # ============================================
  test-core:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache
            packages/*/.dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Get core package dependencies (parallel)
        run: |
          (cd packages/core_domain && flutter pub get) &
          (cd packages/core_ui && flutter pub get) &
          (cd packages/core_data && flutter pub get) &
          (cd packages/core_ai && flutter pub get) &
          (cd packages/core_auth && flutter pub get) &
          wait

      - name: Run core package tests (parallel)
        run: |
          echo "Running core package tests in parallel..."
          (cd packages/core_domain && flutter test --reporter=compact) &
          (cd packages/core_data && flutter test --reporter=compact) &
          (cd packages/core_ai && flutter test --reporter=compact) &
          (cd packages/core_auth && flutter test --reporter=compact) &
          wait
          echo "All core package tests completed!"

  # ============================================
  # App Tests with Coverage (runs on push to main only)
  # This is the expensive job - skip on PRs
  # ============================================
  test-app:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'push'
    needs: [analyze, test-core]
    steps:
      - uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache
            app/.dart_tool
            packages/*/.dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Get dependencies (parallel)
        run: |
          (cd packages/core_domain && flutter pub get) &
          (cd packages/core_ui && flutter pub get) &
          (cd packages/core_data && flutter pub get) &
          (cd packages/core_ai && flutter pub get) &
          (cd packages/core_auth && flutter pub get) &
          wait
          cd app && flutter pub get

      - name: Run code generation
        run: |
          cd app
          dart run build_runner clean
          dart run build_runner build --delete-conflicting-outputs

      - name: Run app tests with coverage
        run: |
          cd app
          flutter test --coverage --reporter=compact

      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          files: ./app/coverage/lcov.info
          flags: flutter
          name: flutter-coverage

  # ============================================
  # Build Android - Multi-Platform Matrix
  # ============================================
  # Builds all platform variants:
  # - mobile-full: All features
  # - mobile-streaming: IPTV + Music
  # - tv: IPTV only
  # ============================================
  build-android:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: mobile-full
            target: lib/main.dart
            variant: full
            app_platform: mobileFull
            use_stubs: false
            enforce_size: false
            size_target_mb: 35
            description: "Full app with all features (size report only)"
          - name: mobile-streaming
            target: lib/main_mobile_streaming.dart
            variant: streaming
            app_platform: mobileStreaming
            use_stubs: true
            enforce_size: true
            pubspec: pubspec_streaming.yaml
            size_target_mb: 35
            description: "Streaming app (IPTV + Music)"
          - name: tv
            target: lib/main_tv.dart
            variant: tv
            app_platform: androidTv
            use_stubs: true
            enforce_size: true
            pubspec: pubspec_tv.yaml
            size_target_mb: 35
            description: "Android TV (IPTV only)"
    steps:
      - uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache
            app/.dart_tool
          key: pub-${{ runner.os }}-${{ matrix.platform.name }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-${{ matrix.platform.name }}-
            pub-${{ runner.os }}-

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      # ===========================================
      # Firebase Configuration Setup
      # ===========================================
      - name: Create Firebase Config
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          cd app
          if [ "${{ github.event_name }}" != "pull_request" ] && [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" | base64 -d > android/app/google-services.json
          else
            echo "::warning::Using CI placeholder Firebase config for APK size build."
            cat > android/app/google-services.json <<'JSON'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "airo-ci-placeholder",
              "storage_bucket": "airo-ci-placeholder.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000000000",
                  "android_client_info": {
                    "package_name": "io.airo.app"
                  }
                },
                "oauth_client": [],
                "api_key": [
                  {
                    "current_key": "ci-placeholder"
                  }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              }
            ],
            "configuration_version": "1"
          }
          JSON
          fi
          if [ ! -f android/app/google-services.json ] || [ ! -s android/app/google-services.json ]; then
            echo "::error::Failed to create google-services.json."
            exit 1
          fi
          echo "✅ Firebase configuration created successfully"

      - name: Create CI validation signing config
        run: |
          cd app/android
          keytool -genkeypair \
            -v \
            -keystore ci-validation.keystore \
            -storepass ci-validation-password \
            -keypass ci-validation-password \
            -alias ci-validation \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Airo CI Validation,O=DevelopersCoffee,C=US"
          {
            echo "storeFile=ci-validation.keystore"
            echo "storePassword=ci-validation-password"
            echo "keyAlias=ci-validation"
            echo "keyPassword=ci-validation-password"
          } > key.properties
          chmod 600 ci-validation.keystore key.properties
          echo "✅ CI validation signing config created"

      # ===========================================
      # Apply Platform-Specific Pubspec (if using stubs)
      # ===========================================
      - name: Apply platform-specific pubspec
        if: matrix.platform.use_stubs
        run: |
          cd app
          echo "📦 Applying ${{ matrix.platform.pubspec }} for ${{ matrix.platform.name }} build..."
          cp pubspec.yaml pubspec.yaml.backup
          cp ${{ matrix.platform.pubspec }} pubspec.yaml
          echo "✅ Platform-specific pubspec applied"

      - name: Get dependencies
        run: |
          cd packages/core_domain && flutter pub get
          cd ../core_ui && flutter pub get
          cd ../core_data && flutter pub get
          cd ../core_ai && flutter pub get
          cd ../core_auth && flutter pub get
          cd ../../app && flutter pub get

      - name: Patch Android plugin Gradle files
        run: scripts/patch-android-plugin-gradle.sh

      - name: Run code generation
        if: matrix.platform.name == 'mobile-full'
        run: |
          cd app
          dart run build_runner clean
          dart run build_runner build --delete-conflicting-outputs

      - name: Build APK (Release) - ${{ matrix.platform.description }}
        run: |
          cd app
          echo "🔨 Building ${{ matrix.platform.name }} APK..."
          flutter build apk --release \
            --target=${{ matrix.platform.target }} \
            --target-platform=android-arm64 \
            --dart-define=APP_VARIANT=${{ matrix.platform.variant }} \
            --dart-define=APP_PLATFORM=${{ matrix.platform.app_platform }} \
            --tree-shake-icons \
            --split-debug-info=build/debug-info-${{ matrix.platform.name }} \
            --obfuscate
          mv build/app/outputs/flutter-apk/app-release.apk \
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          echo "✅ Build complete"

      # ===========================================
      # Verify APK Size Targets
      # ===========================================
      - name: Check APK sizes
        id: apk_sizes
        continue-on-error: ${{ matrix.platform.enforce_size == false }}
        env:
          APK_SIZE_COMPONENT: ${{ matrix.platform.name }}
          APK_SIZE_APK_GLOB: app/build/app/outputs/flutter-apk/app-*-release.apk
          APK_SIZE_REPORT_FILE: apk-size-${{ matrix.platform.name }}.md
        run: |
          scripts/check-apk-size.sh

      - name: Upload APK size report
        if: github.event_name == 'pull_request' && always()
        uses: actions/upload-artifact@v7
        with:
          name: apk-size-report-${{ matrix.platform.name }}
          path: apk-size-${{ matrix.platform.name }}.md
          if-no-files-found: ignore
          retention-days: 7

      - name: Generate APK baseline update
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          APK_SIZE_COMPONENT: ${{ matrix.platform.name }}
          APK_SIZE_BUDGET_MB: ${{ matrix.platform.size_target_mb }}
        run: |
          mkdir -p apk-size-baselines
          output="apk-size-baselines/${APK_SIZE_COMPONENT}.tsv"
          : > "$output"
          for apk in app/build/app/outputs/flutter-apk/app-*-release.apk; do
            [ -f "$apk" ] || continue
            bytes=$(stat -c%s "$apk")
            artifact=$(basename "$apk")
            printf '%s\t%s\t%s\t%s\n' "$APK_SIZE_COMPONENT" "$artifact" "$bytes" "$APK_SIZE_BUDGET_MB" >> "$output"
          done

      - name: Upload APK baseline update
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: apk-size-baseline-${{ matrix.platform.name }}
          path: apk-size-baselines/${{ matrix.platform.name }}.tsv
          retention-days: 7

      # ===========================================
      # Restore Original Pubspec (if using stubs)
      # ===========================================
      - name: Restore original pubspec
        if: matrix.platform.use_stubs && always()
        run: |
          cd app
          if [ -f pubspec.yaml.backup ]; then
            mv pubspec.yaml.backup pubspec.yaml
            echo "✅ Original pubspec restored"
          fi

      - name: Upload Release APKs
        uses: actions/upload-artifact@v7
        with:
          name: android-${{ matrix.platform.name }}-release
          path: app/build/app/outputs/flutter-apk/app-*-release.apk
          retention-days: 14

      - name: Upload Debug Info
        uses: actions/upload-artifact@v7
        with:
          name: android-${{ matrix.platform.name }}-debug-info
          path: app/build/debug-info-${{ matrix.platform.name }}/
          retention-days: 90

  # ============================================
  # PR APK Size Report Comment
  # ============================================
  comment-apk-size-report:
    runs-on: ubuntu-latest
    needs: [build-android]
    if: github.event_name == 'pull_request' && always()
    permissions:
      actions: read
      issues: write
      pull-requests: read
    steps:
      - name: Download APK size reports
        uses: actions/download-artifact@v6
        with:
          pattern: apk-size-report-*
          path: apk-size-reports
          merge-multiple: true

      - name: Combine APK size reports
        run: |
          {
            echo "# APK Size Guardrail Report"
            echo ""
            for report in apk-size-reports/*.md; do
              [ -f "$report" ] || continue
              cat "$report"
              echo ""
            done
          } > apk-size-report.md

      - name: Comment PR with APK size report
        continue-on-error: true
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- apk-size-guardrail -->';
            const body = `${marker}\n${fs.readFileSync('apk-size-report.md', 'utf8')}\n\n[View run details](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`;
            let existing;

            try {
              const comments = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                per_page: 100,
              });
              existing = comments.data.find((comment) =>
                comment.user.type === 'Bot' && comment.body.includes(marker)
              );

              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                  body,
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body,
                });
              }
            } catch (error) {
              if (error.status === 403) {
                core.warning('Skipping APK size PR comment because this workflow token cannot write comments.');
                return;
              }
              throw error;
            }

  # ============================================
  # Update APK Size Baselines (main only)
  # ============================================
  update-apk-size-baselines:
    runs-on: ubuntu-latest
    needs: [build-android]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download APK baseline updates
        uses: actions/download-artifact@v6
        with:
          pattern: apk-size-baseline-*
          path: apk-size-baseline-updates
          merge-multiple: true

      - name: Commit updated APK size baselines
        run: |
          {
            echo "# APK size guardrail baselines."
            echo "#"
            echo "# Columns:"
            echo "# component: CI build component that produced the APK."
            echo "# artifact: APK file name produced by Flutter."
            echo "# baseline_bytes: approved baseline size in bytes."
            echo "# budget_mb: absolute artifact budget in MiB."
            echo "#"
            echo "# This file is updated automatically after successful main builds."
            echo -e "component\tartifact\tbaseline_bytes\tbudget_mb"
            sort apk-size-baseline-updates/*.tsv
          } > .github/apk-size-baselines.tsv

          if git diff --quiet -- .github/apk-size-baselines.tsv; then
            echo "APK size baselines are unchanged."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/apk-size-baselines.tsv
          git commit -m "ci: update APK size baselines"
          git push

  # ============================================
  # Build Summary Job
  # ============================================
  build-summary:
    runs-on: ubuntu-latest
    needs: [build-android]
    if: github.event_name == 'push'
    steps:
      - name: Generate Build Summary
        run: |
          echo "# 🚀 Multi-Platform Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All platform variants have been built successfully." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Available Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Description | Target Size |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------------|-------------|" >> $GITHUB_STEP_SUMMARY
          echo "| mobile-full | All features | <35MB |" >> $GITHUB_STEP_SUMMARY
          echo "| mobile-streaming | IPTV + Music | <35MB |" >> $GITHUB_STEP_SUMMARY
          echo "| tv | IPTV only | <35MB |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download artifacts from the Actions tab." >> $GITHUB_STEP_SUMMARY

  # ============================================
  # Build Web
  # ============================================
  build-web:
    runs-on: ubuntu-latest
    needs: [analyze, test-app]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache
            app/.dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Get dependencies
        run: |
          cd packages/core_domain && flutter pub get
          cd ../core_ui && flutter pub get
          cd ../core_data && flutter pub get
          cd ../core_ai && flutter pub get
          cd ../core_auth && flutter pub get
          cd ../../app && flutter pub get

      - name: Build Web
        run: |
          cd app
          flutter build web --release

      - name: Upload Web Build
        uses: actions/upload-artifact@v7
        with:
          name: web-build
          path: app/build/web
          retention-days: 14

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
      
      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: |
          cd app
          flutter pub get

      - name: Run linter
        run: |
          cd app
          flutter pub run custom_lint
        continue-on-error: true

  sonarqube:
    runs-on: ubuntu-latest
    needs: test-app
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: |
          cd app
          flutter pub get

      - name: Run tests with coverage
        run: |
          cd app
          flutter test --coverage

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=airo-super-app
            -Dsonar.projectName="Airo Super App"
            -Dsonar.sources=app/lib
            -Dsonar.tests=app/test
            -Dsonar.dart.coverage.reportPath=app/coverage/lcov.info
            -Dsonar.exclusions=**/*.g.dart,**/*.freezed.dart,**/generated/**
        continue-on-error: true

      - name: SonarQube Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        continue-on-error: true

  snyk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: |
          cd app
          flutter pub get

      - name: Run Snyk Security Scan
        uses: snyk/actions@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --file=app/pubspec.yaml
        continue-on-error: true

      - name: Upload Snyk results
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('snyk.sarif') != ''
        with:
          sarif_file: snyk.sarif
        continue-on-error: true

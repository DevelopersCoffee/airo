# Local CI Checks - Optimized for running with `act`
#
# Usage:
#   act -j local-checks          # Run all local checks
#   act -j analyze               # Run only analysis
#   act -j test                  # Run only tests
#
# Requirements:
#   - Docker must be running
#   - Install act: https://github.com/nektos/act
#
# Note: This workflow is designed to work without secrets for local development.
# Automated repository checks run from v* release tags.

name: Local CI Checks

on:
  workflow_dispatch:
  # Can also be triggered manually via act

env:
  FLUTTER_VERSION: '3.44.4'

jobs:
  local-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: |
          cd app
          flutter pub get

      - name: Configure firebase_options.dart
        env:
          FIREBASE_OPTIONS_DART_B64: ${{ secrets.FIREBASE_OPTIONS_DART_B64 }}
        run: |
          cd app
          if [[ -n "$FIREBASE_OPTIONS_DART_B64" ]]; then
            echo "$FIREBASE_OPTIONS_DART_B64" | base64 -d > lib/firebase_options.dart
            echo "Using FIREBASE_OPTIONS_DART_B64."
          else
            cp lib/firebase_options.dart.template lib/firebase_options.dart
            echo "::warning::FIREBASE_OPTIONS_DART_B64 is not set; using placeholder firebase_options.dart."
          fi

      - name: Check formatting
        run: |
          cd app
          dart format --set-exit-if-changed .

      - name: Run analyzer
        run: |
          cd app
          flutter analyze --fatal-infos

      - name: Run tests
        run: |
          cd app
          flutter test

  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: |
          cd app
          flutter pub get

      - name: Configure firebase_options.dart
        env:
          FIREBASE_OPTIONS_DART_B64: ${{ secrets.FIREBASE_OPTIONS_DART_B64 }}
        run: |
          cd app
          if [[ -n "$FIREBASE_OPTIONS_DART_B64" ]]; then
            echo "$FIREBASE_OPTIONS_DART_B64" | base64 -d > lib/firebase_options.dart
            echo "Using FIREBASE_OPTIONS_DART_B64."
          else
            cp lib/firebase_options.dart.template lib/firebase_options.dart
            echo "::warning::FIREBASE_OPTIONS_DART_B64 is not set; using placeholder firebase_options.dart."
          fi

      - name: Run analyzer
        run: |
          cd app
          flutter analyze --fatal-infos

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: |
          cd app
          flutter pub get

      - name: Configure firebase_options.dart
        env:
          FIREBASE_OPTIONS_DART_B64: ${{ secrets.FIREBASE_OPTIONS_DART_B64 }}
        run: |
          cd app
          if [[ -n "$FIREBASE_OPTIONS_DART_B64" ]]; then
            echo "$FIREBASE_OPTIONS_DART_B64" | base64 -d > lib/firebase_options.dart
            echo "Using FIREBASE_OPTIONS_DART_B64."
          else
            cp lib/firebase_options.dart.template lib/firebase_options.dart
            echo "::warning::FIREBASE_OPTIONS_DART_B64 is not set; using placeholder firebase_options.dart."
          fi

      - name: Run tests
        run: |
          cd app
          flutter test --coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: app/coverage/

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: |
          cd app
          flutter pub get

      - name: Configure firebase_options.dart
        env:
          FIREBASE_OPTIONS_DART_B64: ${{ secrets.FIREBASE_OPTIONS_DART_B64 }}
        run: |
          cd app
          if [[ -n "$FIREBASE_OPTIONS_DART_B64" ]]; then
            echo "$FIREBASE_OPTIONS_DART_B64" | base64 -d > lib/firebase_options.dart
            echo "Using FIREBASE_OPTIONS_DART_B64."
          else
            cp lib/firebase_options.dart.template lib/firebase_options.dart
            echo "::warning::FIREBASE_OPTIONS_DART_B64 is not set; using placeholder firebase_options.dart."
          fi

      - name: Check formatting
        run: |
          cd app
          dart format --set-exit-if-changed .

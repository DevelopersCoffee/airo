name: Routine Dependency & Flutter Update
on:
  schedule:
    - cron: '0 4 * * 1' # Runs every Monday at 4:00 AM UTC
  workflow_dispatch: # Allows you to trigger it manually
jobs:
  update-dependencies:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Melos
        run: dart pub global activate melos

      - name: Bootstrap Multi-Package Workspace
        run: melos bootstrap

      - name: Upgrade Flutter & Melos Packages
        run: |
          flutter upgrade
          # Upgrade dependencies across all packages to latest compatible versions
          melos exec -- "flutter pub upgrade"
      - name: Verify Codebase is Green (Run Tests)
        run: |
          # Run analyzer and tests to ensure updates didn't break anything
          melos run analyze
          melos run test
      - name: Create Pull Request for Updates
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: automated flutter and dependency updates"
          title: "🤖 Routine Dependency & Flutter Updates"
          body: |
            This is an automated PR generated by the routine dependency update workflow.
            
            - Flutter SDK upgraded to latest stable.
            - Monorepo dependencies upgraded via Melos.
            - All workspace tests and analysis passed successfully.
          branch: automation/dependency-updates
          delete-branch: true
          labels: |
            dependencies
            automated-pr

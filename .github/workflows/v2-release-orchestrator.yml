name: V2 Release Orchestrator

on:
  push:
    tags:
      - 'v2*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version label, for example v2.0.0'
        required: true
        default: 'v2.0.0'
      build_name:
        description: 'Android versionName, for example 2.0.0'
        required: true
        default: '2.0.0'
      build_number:
        description: 'Android versionCode shared by v2 Android artifacts'
        required: true
        default: '200'
      release_ref:
        description: 'Git ref to release; must be based on origin/v2'
        required: true
        default: 'v2'
      release_branch:
        description: 'Release branch to create/update from release_ref'
        required: true
        default: 'release/v2.0.0'
      dry_run:
        description: 'Build and upload workflow artifacts without public/store publishing'
        required: true
        default: true
        type: boolean
      publish_github_release:
        description: 'Publish GitHub Release assets when dry_run is false'
        required: true
        default: false
        type: boolean
      github_release_mode:
        description: 'Create GitHub Release as draft or published when publishing is enabled'
        required: true
        default: draft
        type: choice
        options:
          - draft
          - published
      production_signing:
        description: 'Require production Android signing and Firebase secrets'
        required: true
        default: false
        type: boolean
      tv_play_track:
        description: 'Optional TV Play upload track when dry_run is false'
        required: true
        default: none
        type: choice
        options:
          - none
          - internal
          - alpha
          - beta
          - production
      mobile_play_track:
        description: 'Optional mobile/tablet Play upload track when dry_run is false'
        required: true
        default: none
        type: choice
        options:
          - none
          - internal
          - alpha
          - beta
          - production
      mobile_profile:
        description: 'Optional mobile/tablet profile to build'
        required: true
        default: none
        type: choice
        options:
          - none
          - iptv-standalone
          - mobile-streaming
      qualification_mode:
        description: 'Qualification report mode for top-level summary'
        required: true
        default: internal
        type: choice
        options:
          - internal
          - public

concurrency:
  group: v2-release-${{ github.ref }}
  cancel-in-progress: false

env:
  DEFAULT_VERSION: v2.0.0
  DEFAULT_BUILD_NAME: 2.0.0
  DEFAULT_BUILD_NUMBER: '200'

jobs:
  prepare:
    name: Prepare v2 release context
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.release.outputs.version }}
      build_name: ${{ steps.release.outputs.build_name }}
      build_number: ${{ steps.release.outputs.build_number }}
      release_ref: ${{ steps.release.outputs.release_ref }}
      release_branch: ${{ steps.release.outputs.release_branch }}
      release_sha: ${{ steps.release.outputs.release_sha }}
      dry_run: ${{ steps.release.outputs.dry_run }}
      publish_github_release: ${{ steps.release.outputs.publish_github_release }}
      github_release_mode: ${{ steps.release.outputs.github_release_mode }}
      production_signing: ${{ steps.release.outputs.production_signing }}
      tv_play_track: ${{ steps.release.outputs.tv_play_track }}
      mobile_play_track: ${{ steps.release.outputs.mobile_play_track }}
      mobile_profile: ${{ steps.release.outputs.mobile_profile }}
      qualification_mode: ${{ steps.release.outputs.qualification_mode }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ inputs.release_ref || github.ref }}

      - name: Resolve and validate release ref
        id: release
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_BUILD_NAME: ${{ inputs.build_name }}
          INPUT_BUILD_NUMBER: ${{ inputs.build_number }}
          INPUT_RELEASE_REF: ${{ inputs.release_ref }}
          INPUT_RELEASE_BRANCH: ${{ inputs.release_branch }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
          INPUT_PUBLISH_GITHUB_RELEASE: ${{ inputs.publish_github_release }}
          INPUT_GITHUB_RELEASE_MODE: ${{ inputs.github_release_mode }}
          INPUT_PRODUCTION_SIGNING: ${{ inputs.production_signing }}
          INPUT_TV_PLAY_TRACK: ${{ inputs.tv_play_track }}
          INPUT_MOBILE_PLAY_TRACK: ${{ inputs.mobile_play_track }}
          INPUT_MOBILE_PROFILE: ${{ inputs.mobile_profile }}
          INPUT_QUALIFICATION_MODE: ${{ inputs.qualification_mode }}
        run: |
          git fetch origin main v2 --tags

          version="${INPUT_VERSION:-${GITHUB_REF_NAME:-$DEFAULT_VERSION}}"
          build_name="${INPUT_BUILD_NAME:-${version#v}}"
          build_number="${INPUT_BUILD_NUMBER:-${GITHUB_RUN_NUMBER:-$DEFAULT_BUILD_NUMBER}}"
          release_ref="${INPUT_RELEASE_REF:-$GITHUB_SHA}"
          release_branch="${INPUT_RELEASE_BRANCH:-release/$version}"
          dry_run="${INPUT_DRY_RUN:-true}"
          publish_github_release="${INPUT_PUBLISH_GITHUB_RELEASE:-false}"
          github_release_mode="${INPUT_GITHUB_RELEASE_MODE:-draft}"
          production_signing="${INPUT_PRODUCTION_SIGNING:-false}"
          tv_play_track="${INPUT_TV_PLAY_TRACK:-none}"
          mobile_play_track="${INPUT_MOBILE_PLAY_TRACK:-none}"
          mobile_profile="${INPUT_MOBILE_PROFILE:-none}"
          qualification_mode="${INPUT_QUALIFICATION_MODE:-internal}"

          if [ "$dry_run" = "true" ]; then
            publish_github_release="false"
            tv_play_track="none"
            mobile_play_track="none"
          fi

          case "$tv_play_track" in
            none|internal|alpha|beta|production) ;;
            *)
              echo "::error::Unsupported TV Play track: $tv_play_track"
              exit 1
              ;;
          esac

          case "$mobile_play_track" in
            none|internal|alpha|beta|production) ;;
            *)
              echo "::error::Unsupported mobile/tablet Play track: $mobile_play_track"
              exit 1
              ;;
          esac

          if [ "$mobile_profile" = "none" ] && [ "$mobile_play_track" != "none" ]; then
            echo "::error::mobile_play_track requires mobile_profile to be iptv-standalone or mobile-streaming."
            exit 1
          fi

          case "$github_release_mode" in
            draft|published) ;;
            *)
              echo "::error::Unsupported github_release_mode: $github_release_mode"
              exit 1
              ;;
          esac

          if git rev-parse --verify "origin/$release_ref^{commit}" >/dev/null 2>&1; then
            release_commit="$(git rev-parse "origin/$release_ref^{commit}")"
          elif git rev-parse --verify "$release_ref^{commit}" >/dev/null 2>&1; then
            release_commit="$(git rev-parse "$release_ref^{commit}")"
          else
            echo "::error::Cannot resolve release_ref: $release_ref"
            exit 1
          fi

          if ! git merge-base --is-ancestor origin/v2 "$release_commit"; then
            echo "::error::Release ref $release_ref does not contain latest origin/v2."
            exit 1
          fi

          {
            echo "version=$version"
            echo "build_name=$build_name"
            echo "build_number=$build_number"
            echo "release_ref=$release_ref"
            echo "release_branch=$release_branch"
            echo "release_sha=$release_commit"
            echo "dry_run=$dry_run"
            echo "publish_github_release=$publish_github_release"
            echo "github_release_mode=$github_release_mode"
            echo "production_signing=$production_signing"
            echo "tv_play_track=$tv_play_track"
            echo "mobile_play_track=$mobile_play_track"
            echo "mobile_profile=$mobile_profile"
            echo "qualification_mode=$qualification_mode"
          } >> "$GITHUB_OUTPUT"

          {
            echo "# V2 release context"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Version | $version |"
            echo "| Build name | $build_name |"
            echo "| Build number | $build_number |"
            echo "| Release ref | $release_ref |"
            echo "| Release branch | $release_branch |"
            echo "| Release SHA | $release_commit |"
            echo "| Dry run | $dry_run |"
            echo "| GitHub Release publish | $publish_github_release |"
            echo "| GitHub Release mode | $github_release_mode |"
            echo "| TV Play track | $tv_play_track |"
            echo "| Mobile/tablet Play track | $mobile_play_track |"
            echo "| Mobile/tablet profile | $mobile_profile |"
            echo "| Qualification mode | $qualification_mode |"
          } >> "$GITHUB_STEP_SUMMARY"

  release-contracts:
    name: Validate release contracts
    runs-on: ubuntu-latest
    needs: [prepare]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare.outputs.release_ref }}

      - name: Validate release scripts and workflow syntax
        run: |
          ruby -e 'require "yaml"; ARGV.each { |f| YAML.load_file(f); puts "ok #{f}" }' \
            .github/workflows/v2-release-orchestrator.yml \
            .github/workflows/airo-tv-release.yml \
            .github/workflows/airo-mobile-tablet-release.yml
          python3 -m py_compile \
            scripts/check-build-profiles.py \
            scripts/generate-release-manifest.py \
            scripts/generate-release-qualification-report.py
          scripts/check-build-profiles.py
          scripts/test-generate-release-manifest.sh
          scripts/test-generate-release-qualification-report.sh

  mobile-tablet-release:
    name: Mobile and tablet release leg
    if: needs.prepare.outputs.mobile_profile != 'none'
    needs: [prepare, release-contracts]
    permissions:
      contents: read
    uses: ./.github/workflows/airo-mobile-tablet-release.yml
    with:
      profile: ${{ needs.prepare.outputs.mobile_profile }}
      version: ${{ needs.prepare.outputs.version }}
      build_name: ${{ needs.prepare.outputs.build_name }}
      build_number: ${{ needs.prepare.outputs.build_number }}
      release_ref: ${{ needs.prepare.outputs.release_ref }}
      production_signing: ${{ needs.prepare.outputs.production_signing == 'true' }}
      play_track: ${{ needs.prepare.outputs.mobile_play_track }}
    secrets: inherit

  tv-release:
    name: TV release leg
    needs: [prepare, release-contracts]
    permissions:
      actions: read
      contents: write
    uses: ./.github/workflows/airo-tv-release.yml
    with:
      version: ${{ needs.prepare.outputs.version }}
      build_name: ${{ needs.prepare.outputs.build_name }}
      build_number: ${{ needs.prepare.outputs.build_number }}
      release_ref: ${{ needs.prepare.outputs.release_ref }}
      release_branch: ${{ needs.prepare.outputs.release_branch }}
      publish_github_release: false
      production_signing: ${{ needs.prepare.outputs.production_signing == 'true' }}
      play_track: ${{ needs.prepare.outputs.tv_play_track }}
    secrets: inherit

  release-summary:
    name: V2 release summary
    runs-on: ubuntu-latest
    needs: [prepare, release-contracts, mobile-tablet-release, tv-release]
    if: always()
    permissions:
      actions: read
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare.outputs.release_ref }}

      - name: Download TV release artifacts
        if: needs.tv-release.result == 'success'
        uses: actions/download-artifact@v8
        with:
          name: airo-tv-release-${{ needs.prepare.outputs.version }}
          path: release-artifacts/tv

      - name: Download mobile/tablet release artifacts
        if: needs.mobile-tablet-release.result == 'success'
        uses: actions/download-artifact@v8
        with:
          name: airo-mobile-tablet-${{ needs.prepare.outputs.mobile_profile }}-${{ needs.prepare.outputs.version }}
          path: release-artifacts/mobile-tablet

      - name: Generate TV qualification report
        if: needs.tv-release.result == 'success'
        env:
          QUALIFICATION_MODE: ${{ needs.prepare.outputs.qualification_mode }}
        run: |
          manifest="$(find release-artifacts/tv -maxdepth 1 -name '*Release-Manifest.json' | head -n 1)"
          if [ -z "$manifest" ]; then
            echo "::error::TV release manifest was not found in downloaded artifacts."
            exit 1
          fi
          scripts/generate-release-qualification-report.py \
            --manifest "$manifest" \
            --mode "$QUALIFICATION_MODE"

      - name: Generate mobile/tablet qualification report
        if: needs.mobile-tablet-release.result == 'success'
        env:
          QUALIFICATION_MODE: ${{ needs.prepare.outputs.qualification_mode }}
        run: |
          manifest="$(find release-artifacts/mobile-tablet -maxdepth 1 -name '*Release-Manifest.json' | head -n 1)"
          if [ -z "$manifest" ]; then
            echo "::error::Mobile/tablet release manifest was not found in downloaded artifacts."
            exit 1
          fi
          scripts/generate-release-qualification-report.py \
            --manifest "$manifest" \
            --mode "$QUALIFICATION_MODE"

      - name: Upload top-level release evidence
        if: needs.tv-release.result == 'success'
        uses: actions/upload-artifact@v7
        with:
          name: v2-release-evidence-${{ needs.prepare.outputs.version }}
          path: release-artifacts/
          retention-days: 30

      - name: Prepare GitHub Release assets
        if: needs.tv-release.result == 'success' && needs.prepare.outputs.publish_github_release == 'true'
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          BUILD_NAME: ${{ needs.prepare.outputs.build_name }}
          BUILD_NUMBER: ${{ needs.prepare.outputs.build_number }}
          RELEASE_REF: ${{ needs.prepare.outputs.release_ref }}
          RELEASE_SHA: ${{ needs.prepare.outputs.release_sha }}
          MOBILE_PROFILE: ${{ needs.prepare.outputs.mobile_profile }}
        run: |
          rm -rf github-release-assets
          mkdir -p github-release-assets

          require_asset() {
            if [ ! -f "$1" ]; then
              echo "::error::Required release asset is missing: $1"
              return 1
            fi
            cp "$1" github-release-assets/
          }

          require_asset "release-artifacts/tv/Airo-TV-${BUILD_NAME}.apk"
          require_asset "release-artifacts/tv/Airo-TV-${BUILD_NAME}-Play-Store.aab"

          case "$MOBILE_PROFILE" in
            none)
              ;;
            iptv-standalone)
              require_asset "release-artifacts/mobile-tablet/Airo-IPTV-${BUILD_NAME}-${BUILD_NUMBER}-arm64.apk"
              require_asset "release-artifacts/mobile-tablet/Airo-IPTV-${BUILD_NAME}-${BUILD_NUMBER}-Play-Store.aab"
              ;;
            mobile-streaming)
              require_asset "release-artifacts/mobile-tablet/Airo-Streaming-${BUILD_NAME}-${BUILD_NUMBER}-arm64.apk"
              require_asset "release-artifacts/mobile-tablet/Airo-Streaming-${BUILD_NAME}-${BUILD_NUMBER}-Play-Store.aab"
              ;;
            *)
              echo "::error::Unsupported mobile/tablet profile for release assets: $MOBILE_PROFILE"
              exit 1
              ;;
          esac

          scripts/generate-release-manifest.py \
            --artifacts-dir github-release-assets \
            --version "$BUILD_NAME" \
            --build-number "$BUILD_NUMBER" \
            --source-ref "$RELEASE_REF" \
            --source-sha "$RELEASE_SHA" \
            --workflow-name "$GITHUB_WORKFLOW" \
            --workflow-run "$GITHUB_RUN_ID" \
            --workflow-run-attempt "$GITHUB_RUN_ATTEMPT" \
            --repository "$GITHUB_REPOSITORY"
          mv github-release-assets/Release-Manifest.json "github-release-assets/Airo-${BUILD_NAME}-Release-Manifest.json"

          notes="github-release-assets/Airo-${BUILD_NAME}-Release-Notes.md"
          {
            echo "# Airo ${BUILD_NAME}"
            echo ""
            echo "This v2 release publishes the selected Android profile artifacts produced by the release orchestrator."
            echo ""
            echo "## Included Artifacts"
            echo ""
            find github-release-assets -maxdepth 1 -type f \
              \( -name '*.apk' -o -name '*.aab' -o -name '*Release-Manifest.json' -o -name 'SHA256SUMS' \) \
              -printf '- %f\n' | sort
            echo ""
            echo "## Verification"
            echo ""
            echo "SHA256 checksums are published in the SHA256SUMS asset and mapped to profile metadata in Airo-${BUILD_NAME}-Release-Manifest.json."
            echo ""
            echo '```text'
            cat github-release-assets/SHA256SUMS
            echo '```'
            echo ""
            echo "## Distribution Notes"
            echo ""
            echo "- APK assets are for direct install and internal verification."
            echo "- AAB assets are Google Play upload inputs."
            echo "- Store and Firebase uploads remain controlled by the credential-specific workflows."
          } > "$notes"

          ls -lh github-release-assets

      - name: Publish GitHub Release
        if: needs.tv-release.result == 'success' && needs.prepare.outputs.publish_github_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.prepare.outputs.version }}
          BUILD_NAME: ${{ needs.prepare.outputs.build_name }}
          RELEASE_SHA: ${{ needs.prepare.outputs.release_sha }}
          GITHUB_RELEASE_MODE: ${{ needs.prepare.outputs.github_release_mode }}
        run: |
          notes="github-release-assets/Airo-${BUILD_NAME}-Release-Notes.md"
          if [ ! -f "$notes" ]; then
            echo "::error::Release notes were not generated: $notes"
            exit 1
          fi
          draft_arg="--draft=false"
          if [ "$GITHUB_RELEASE_MODE" = "draft" ]; then
            draft_arg="--draft=true"
          fi

          if gh release view "$VERSION" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$VERSION" github-release-assets/* \
              --clobber \
              --repo "$GITHUB_REPOSITORY"
            gh release edit "$VERSION" \
              --title "Airo ${BUILD_NAME}" \
              --notes-file "$notes" \
              "$draft_arg" \
              --repo "$GITHUB_REPOSITORY"
          else
            args=(
              release create "$VERSION" github-release-assets/*
              --title "Airo ${BUILD_NAME}"
              --target "$RELEASE_SHA"
              --notes-file "$notes"
              --repo "$GITHUB_REPOSITORY"
            )
            if [ "$GITHUB_RELEASE_MODE" = "draft" ]; then
              args+=(--draft)
            fi
            gh "${args[@]}"
          fi

      - name: Write release summary
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          BUILD_NAME: ${{ needs.prepare.outputs.build_name }}
          BUILD_NUMBER: ${{ needs.prepare.outputs.build_number }}
          RELEASE_REF: ${{ needs.prepare.outputs.release_ref }}
          RELEASE_SHA: ${{ needs.prepare.outputs.release_sha }}
          DRY_RUN: ${{ needs.prepare.outputs.dry_run }}
          PUBLISH_GITHUB_RELEASE: ${{ needs.prepare.outputs.publish_github_release }}
          GITHUB_RELEASE_MODE: ${{ needs.prepare.outputs.github_release_mode }}
          TV_RESULT: ${{ needs.tv-release.result }}
          MOBILE_RESULT: ${{ needs.mobile-tablet-release.result }}
          MOBILE_PROFILE: ${{ needs.prepare.outputs.mobile_profile }}
          TV_PLAY_TRACK: ${{ needs.prepare.outputs.tv_play_track }}
          MOBILE_PLAY_TRACK: ${{ needs.prepare.outputs.mobile_play_track }}
          CONTRACT_RESULT: ${{ needs.release-contracts.result }}
        run: |
          {
            echo "# V2 release summary"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Version | $VERSION |"
            echo "| Build name | $BUILD_NAME |"
            echo "| Build number | $BUILD_NUMBER |"
            echo "| Release ref | $RELEASE_REF |"
            echo "| Release SHA | $RELEASE_SHA |"
            echo "| Dry run | $DRY_RUN |"
            echo "| GitHub Release publish | $PUBLISH_GITHUB_RELEASE |"
            echo "| GitHub Release mode | $GITHUB_RELEASE_MODE |"
            echo "| TV leg | $TV_RESULT |"
            echo "| TV Play track | $TV_PLAY_TRACK |"
            echo "| Mobile/tablet profile | $MOBILE_PROFILE |"
            echo "| Mobile/tablet leg | $MOBILE_RESULT |"
            echo "| Mobile/tablet Play track | $MOBILE_PLAY_TRACK |"
            echo "| Release contracts | $CONTRACT_RESULT |"
            echo ""
            echo "## Artifact evidence"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          if [ -d release-artifacts/tv ]; then
            {
              echo "### TV"
              echo ""
              find release-artifacts/tv -maxdepth 1 -type f -printf '- %f\n' | sort
              echo ""
              echo "TV artifacts include APK/AAB files, SHA256SUMS, release manifest, and an internal qualification report when generated by this orchestrator."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "TV artifacts were not available because the TV leg result was $TV_RESULT." >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ -d release-artifacts/mobile-tablet ]; then
            {
              echo ""
              echo "### Mobile/tablet"
              echo ""
              find release-artifacts/mobile-tablet -maxdepth 1 -type f -printf '- %f\n' | sort
              echo ""
              echo "Mobile/tablet artifacts include APK/AAB files, SHA256SUMS, release manifest, and an internal qualification report when generated by this orchestrator."
            } >> "$GITHUB_STEP_SUMMARY"
          elif [ "$MOBILE_PROFILE" = "none" ]; then
            echo "Mobile/tablet artifacts were not requested for this orchestrator run." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Mobile/tablet artifacts were not available because the mobile/tablet leg result was $MOBILE_RESULT." >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ -d github-release-assets ]; then
            {
              echo ""
              echo "### GitHub Release assets"
              echo ""
              find github-release-assets -maxdepth 1 -type f -printf '- %f\n' | sort
            } >> "$GITHUB_STEP_SUMMARY"
          elif [ "$PUBLISH_GITHUB_RELEASE" = "true" ]; then
            echo "GitHub Release assets were requested but were not prepared." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Enforce orchestrator result
        env:
          TV_RESULT: ${{ needs.tv-release.result }}
          MOBILE_RESULT: ${{ needs.mobile-tablet-release.result }}
          MOBILE_PROFILE: ${{ needs.prepare.outputs.mobile_profile }}
          CONTRACT_RESULT: ${{ needs.release-contracts.result }}
        run: |
          if [ "$CONTRACT_RESULT" != "success" ]; then
            echo "::error::Release contract validation did not pass: $CONTRACT_RESULT"
            exit 1
          fi
          if [ "$TV_RESULT" != "success" ]; then
            echo "::error::TV release leg did not pass: $TV_RESULT"
            exit 1
          fi
          if [ "$MOBILE_PROFILE" != "none" ] && [ "$MOBILE_RESULT" != "success" ]; then
            echo "::error::Mobile/tablet release leg did not pass: $MOBILE_RESULT"
            exit 1
          fi

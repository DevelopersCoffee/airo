name: Feature Request
description: Suggest a product, platform, release, or developer-experience improvement.
title: "[Feature] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Do not include private playlist URLs, credentials, tokens, or personal data.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or developer problem should this solve?
      placeholder: Describe the current limitation.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: What should Airo do differently?
      placeholder: Describe the smallest useful version of the feature.
    validations:
      required: true
  - type: dropdown
    id: profile
    attributes:
      label: App Profile
      description: Which release profile is affected?
      options:
        - Airo mobile
        - Airo tablet
        - Airo TV / Android TV
        - Fire TV
        - Web
        - Developer tooling
        - Documentation
        - Not sure
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version Or Release
      description: If relevant, provide the app version, release tag, or branch.
      placeholder: "Example: airo-tv-v0.0.2, v2, main"
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What workaround or alternative did you try?
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: How would maintainers know this is complete?
      placeholder: "- [ ] ..."
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy Check
      options:
        - label: I did not include private playlist URLs, credentials, tokens, or personal data.
          required: true
